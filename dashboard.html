    ["waiting", "Waiting"], ["tagged", "Tagged"],
    ["completed", "Completed"], ["qa_reviewed", "QA Reviewed"], ["qa_coverage", "QA %"],
    ["donePct", "Properly done %"],
    ["teams", "Teams"], ["tat", "Turn-around"], ["flags", "Flags"],
  ];
  const sortInd = (k) => k === TASKS_STATE.sortBy ? (TASKS_STATE.sortDir === "asc" ? "▲" : "▼") : "";
  const rightCols = new Set(['total','Valid','BO QA','waiting','tagged','completed','qa_reviewed','qa_coverage']);
  const head = `<thead><tr>${cols.map(([k, lab]) => `<th data-sort="${k}" class="${rightCols.has(k) ? 'right' : ''}">${esc(lab)} <span class="sort-ind">${sortInd(k)}</span></th>`).join("")}</tr></thead>`;
  const body = list.map(t => {
    const s = t.status_distribution;
    const total = t.total_records_in_cache;
    const donePct = total ? (t.properly_completed / total) * 100 : 0;
    const teams = t.teams_worked.map(x => x.team).join(", ") || "—";
    const flagsHtml = t.flags.map(f => `<span class="flag-pill ${FLAG_STYLES[f] || 'gray'}">${esc(f)}</span>`).join("");
    return `<tr>
      <td><a class="task-name" data-task="${esc(t.name)}">${esc(t.name)}</a></td>
      <td class="right">${total.toLocaleString()}</td>
      <td class="right">${s.Valid}</td>
      <td class="right">${s["Selected for BO QA "]}</td>
      <td class="right">${s.waiting}</td>
      <td class="right">${s.tagged}</td>
      <td class="right">${t.completed || 0}</td>
      <td class="right">${t.qa_reviewed || 0}</td>
      <td class="right"><span class="pill-inline ${(t.qa_coverage_pct || 0) >= 15 ? 'good' : (t.qa_coverage_pct || 0) >= 5 ? 'warn' : 'bad'}">${(t.qa_coverage_pct || 0).toFixed(0)}%</span></td>
      <td class="right"><span class="pill-inline ${pctClass(donePct).replace('warn','warn')}">${donePct.toFixed(0)}%</span></td>
      <td>${esc(teams)}</td>
      <td>${tatCell(t)}</td>
      <td>${flagsHtml || '<span class="small-mono">—</span>'}</td>
    </tr>`;
  }).join("");
  document.getElementById("tasksTable").innerHTML = `<table class="sortable">${head}<tbody>${body || '<tr><td colspan="13" class="empty">No tasks match.</td></tr>'}</tbody></table>`;
  // Click handlers
  document.querySelectorAll("#tasksTable th[data-sort]").forEach(th => {
    th.addEventListener("click", () => {
      const k = th.dataset.sort;
      if (TASKS_STATE.sortBy === k) TASKS_STATE.sortDir = TASKS_STATE.sortDir === "asc" ? "desc" : "asc";
      else { TASKS_STATE.sortBy = k; TASKS_STATE.sortDir = "desc"; }
      renderTasksTable();
    });
  });
  document.querySelectorAll(".task-name").forEach(a => {
    a.addEventListener("click", () => openTaskDrawer(a.dataset.task));
  });
  fitTableHeight(document.getElementById("tasksTable"));
}

async function fetchTaskRecords(taskName) {
  const status = document.getElementById("fetchTaskStatus");
  const out = document.getElementById("fetchTaskResults");
  if (!HAS_COWORK) {
    status.textContent = "Cowork required for live fetch.";
    return;
  }
  document.getElementById("fetchTaskBtn").disabled = true;
  status.textContent = "fetching…";
  const args = {
    baseId: BASE_ID,
    tableId: TABLE_ID,
    pageSize: 100,
    filters: { operator: "and", operands: [{ operator: "=", operands: [F.requested_by, taskName] }] },
    sort: [{ fieldId: F.last_modified, direction: "desc" }],
  };
  const all = [];
  let cursor;
  for (let i = 0; i < 30; i++) {
    if (cursor) args.cursor = cursor; else delete args.cursor;
    let result;
    try { result = await window.cowork.callMcpTool(AIRTABLE_TOOL, args); }
    catch (e) { console.error(e); break; }
    const payload = unwrapJson(result);
    if (!payload || !payload.records) break;
    all.push(...payload.records);
    if (!payload.nextCursor) break;
    cursor = payload.nextCursor;
  }
  status.textContent = `fetched ${all.length} record${all.length === 1 ? '' : 's'}`;
  document.getElementById("fetchTaskBtn").disabled = false;

  const rows = all.slice(0, 500).map(r => {
    const c = r.cellValuesByFieldId || {};
    const asgs = (c[F.assignee] || []).map(x => x.name).join(", ");
    const vs = c[F.verification_status]?.name || "";
    const co = (c[F.company_id_and_name] || [])[0]?.name || "";
    const lm = c[F.last_modified] || "";
    const recFlags = [];
    if ((vs === "Done" || vs === "Valid") && !co && c[F.dead_vessel] !== true) recFlags.push('<span class="flag-pill red">company-gap</span>');
    if (!asgs) recFlags.push('<span class="flag-pill red">unassigned</span>');
    return `<tr>
      <td class="mono">${esc(c[F.imo] || "")}</td>
      <td>${esc(c[F.role]?.name || "")}</td>
      <td>${esc(vs)}</td>
      <td>${esc(co || "—")}</td>
      <td>${esc(asgs || "—")}</td>
      <td class="mono">${esc(fmtEatDateTime(lm))}</td>
      <td>${recFlags.join(" ")}</td>
    </tr>`;
  }).join("");
  const more = all.length > 500 ? `<div class="footer-note">${all.length - 500} more not shown.</div>` : "";
  out.innerHTML = `<table><thead><tr><th>IMO</th><th>Role</th><th>Status</th><th>Company</th><th>Assignees</th><th>Last modified</th><th>Flags</th></tr></thead><tbody>${rows}</tbody></table>${more}`;
}

function _newCompaniesFiltered() {

  if (NEW_COMPANIES_STATE.view === "needs_qa") {
    out = out.filter(r => !r.qa_assignee || !r.qa_status);
  }
  const k = NEW_COMPANIES_STATE.sortBy, dir = NEW_COMPANIES_STATE.sortDir === "asc" ? 1 : -1;
  out = [...out].sort((a, b) => {
    let av, bv;
    if      (k === "requested_by")        { av = a.requested_by || ""; bv = b.requested_by || ""; }
    else if (k === "assignee")            { av = a.assignee || "";     bv = b.assignee || ""; }
    else if (k === "team")                { av = a.team || "";         bv = b.team || ""; }
    else if (k === "add_new_company")     { av = a.add_new_company || ""; bv = b.add_new_company || ""; }

STATE.weeklySnapshots = STATE.weeklySnapshots || {};  // {dateStr: aggsV2 | null (not found)}

async function loadWeeklySnapshots(startISO, endISO) {
  const dates = [];
  let d = new Date(startISO + "T00:00:00+03:00");
  const end = new Date(endISO + "T00:00:00+03:00");
  while (d <= end) {
    dates.push(d.toLocaleDateString("en-CA", { timeZone: "Africa/Nairobi" }));
    d.setDate(d.getDate() + 1);
  }
  // Always include today, since today's aggregate is in STATE.v2 (no snapshot file may exist yet).
  if (STATE.v2?.date && !dates.includes(STATE.v2.date)) dates.push(STATE.v2.date);
  for (const date of dates) {
    if (STATE.weeklySnapshots[date] !== undefined) continue;  // cached (incl. null = tried & missing)
    // Today's data is already in STATE.v2 — use that directly, don't fetch.
    if (date === STATE.v2?.date) {
      STATE.weeklySnapshots[date] = STATE.v2;
      continue;
    }
    const data = await readJson(`.poll_work/snapshots/${date}.json`);
    STATE.weeklySnapshots[date] = data;  // null when missing
  }
  return dates;
}

function _enumerateDays(startISO, endISO) {
  const out = [];
  let d = new Date(startISO + "T00:00:00+03:00");
  const end = new Date(endISO + "T00:00:00+03:00");
  while (d <= end) {
    out.push(d.toLocaleDateString("en-CA", { timeZone: "Africa/Nairobi" }));
    d.setDate(d.getDate() + 1);
  }
  return out;
}

  }
  if (COMPLETED_STATE.view === "completed")  out = out.filter(t => t.isCompleted);
  else if (COMPLETED_STATE.view === "open")  out = out.filter(t => !t.isCompleted);
  // Sort
  const k = COMPLETED_STATE.sortBy, dir = COMPLETED_STATE.sortDir === "asc" ? 1 : -1;
  out = [...out].sort((a, b) => {
    let av, bv;
    if (k === "name") { av = a.name; bv = b.name; }
    else if (k === "type")    { av = a.latest.is_sanctions ? 1 : 0; bv = b.latest.is_sanctions ? 1 : 0; }
    else if (k === "records") { av = a.trueTotal; bv = b.trueTotal; }
    else if (k === "status")  { av = a.isCompleted ? 1 : 0; bv = b.isCompleted ? 1 : 0; }
    else if (k === "donePct") {
      av = a.latest.total_records ? (a.latest.properly_completed || 0) / a.latest.total_records : 0;
      bv = b.latest.total_records ? (b.latest.properly_completed || 0) / b.latest.total_records : 0;
    }
    else if (k === "qa_coverage") { av = a.latest.qa_coverage_pct || 0; bv = b.latest.qa_coverage_pct || 0; }
    else if (k === "teams")   { av = (a.latest.teams_worked || []).length; bv = (b.latest.teams_worked || []).length; }
    else if (k === "received")      { av = a.latest.date_first_seen || ""; bv = b.latest.date_first_seen || ""; }
    else if (k === "assigned")      { av = a.assignedDate || ""; bv = b.assignedDate || ""; }
    else if (k === "completedDate") { av = a.latest.end_time || ""; bv = b.latest.end_time || ""; }
    else if (k === "tat") {
      av = (a.isCompleted && a.latest.tat_hours != null) ? a.latest.tat_hours : -1;
      bv = (b.isCompleted && b.latest.tat_hours != null) ? b.latest.tat_hours : -1;
    }
    else /* received */ { av = a.latest.date_first_seen || ""; bv = b.latest.date_first_seen || ""; }
    if (av < bv) return -1 * dir;
    if (av > bv) return  1 * dir;
    return 0;
  });
  return out;
}

function renderCompletedTable() {
  const list = _completedFiltered();
  document.getElementById("completedCount").textContent = `${list.length} of ${(STATE.completedTasks || []).length}`;
  const cols = [
    ["name", "Task name"], ["type", "Type"], ["records", "Records"],
    ["status", "Status"], ["donePct", "Properly done %"], ["qa_coverage", "QA coverage %"],
    ["teams", "Teams"], ["received", "Received"], ["assigned", "Assigned"],
    ["completedDate", "Completed"], ["tat", "Turn-around"],
  ];
  const sortInd = (k) => k === COMPLETED_STATE.sortBy ? (COMPLETED_STATE.sortDir === "asc" ? "▲" : "▼") : "";
  const rightCols = new Set(['records']);
  const head = `<thead><tr>${cols.map(([k, lab]) => `<th data-sort="${k}" class="${rightCols.has(k) ? 'right' : ''}">${esc(lab)} <span class="sort-ind">${sortInd(k)}</span></th>`).join("")}</tr></thead>`;
  const body = list.map(t => {
    const L = t.latest;
    const total = L.total_records || 0;
    const donePct = total ? ((L.properly_completed || 0) / total) * 100 : 0;
    const cov = L.qa_coverage_pct || 0;
    const teams = (L.teams_worked || []).map(x => x.team).join(", ") || "—";
    return `<tr>
      <td><a class="completed-task-name" data-task="${esc(t.name)}">${esc(t.name)}</a></td>
      <td><span class="pill-inline ${L.is_sanctions ? 'bad' : 'good'}">${L.is_sanctions ? 'Sanctions' : 'Standard'}</span></td>
      <td class="right">${t.trueTotal.toLocaleString()}</td>
      <td><span class="pill-inline ${t.isCompleted ? 'good' : 'warn'}">${t.isCompleted ? 'Completed' : 'Open'}</span></td>
      <td><span class="pill-inline ${pctClass(donePct)}">${donePct.toFixed(0)}%</span></td>
      <td><span class="pill-inline ${cov >= 15 ? 'good' : cov >= 5 ? 'warn' : 'bad'}">${cov.toFixed(0)}%</span></td>
      <td>${esc(teams)}</td>
      <td>${esc(shortDate(t.latest.date_first_seen))}</td>
      <td>${t.assignedDate ? esc(shortDate(t.assignedDate)) : '<span class="small-mono">—</span>'}</td>
      <td>${t.isCompleted && t.latest.end_time ? esc(shortDate(t.latest.end_time)) : '<span class="small-mono">—</span>'}</td>
      <td>${t.isCompleted && t.latest.tat_hours != null ? esc(formatDuration(t.latest.tat_hours)) : '<span class="small-mono">—</span>'}</td>
    </tr>`;
  }).join("");
  document.getElementById("completedTable").innerHTML = `<table class="sortable">${head}<tbody>${body || '<tr><td colspan="11" class="empty">No tasks match.</td></tr>'}</tbody></table>`;
  document.querySelectorAll("#completedTable th[data-sort]").forEach(th => {
    th.addEventListener("click", () => {
      const k = th.dataset.sort;
      if (COMPLETED_STATE.sortBy === k) COMPLETED_STATE.sortDir = COMPLETED_STATE.sortDir === "asc" ? "desc" : "asc";
      else { COMPLETED_STATE.sortBy = k; COMPLETED_STATE.sortDir = "desc"; }
      renderCompletedTable();
    });
  });
  document.querySelectorAll(".completed-task-name").forEach(a => {
    a.addEventListener("click", () => openCompletedTaskDrawer(a.dataset.task));
  });
  fitTableHeight(document.getElementById("completedTable"));
}

function openCompletedTaskDrawer(taskName) {
  const t = (STATE.completedTasks || []).find(x => x.name === taskName);
  if (!t) return;
  const drawer = document.getElementById("completedDrawer");
  const backdrop = document.getElementById("completedDrawerBackdrop");
  const L = t.latest;
  const hist = t.history;

  const flagsHtml = (L.flags || []).map(f => `<span class="flag-pill ${FLAG_STYLES[f] || 'gray'}">${esc(f)}</span>`).join("") || '<span class="small-mono">no flags</span>';

  // Turn-around: completed → tat_hours; still open → running age + " open".
  const tatStr = t.isCompleted && L.tat_hours != null
    ? formatDuration(L.tat_hours)
    : formatDuration(ageHours(L.date_first_seen)) + " open";

  // Lifecycle day-by-day rows. Every status_distribution access is null-guarded
  // — older recovered rows can have a thinner shape.
  const traceRows = hist.map(h => {
    const sd = h.status_distribution || {};
    return `<tr>
      <td>${esc(shortDate(h.snapshot_date))}</td>
      <td class="right">${(h.total_records || 0).toLocaleString()}</td>
      <td class="right">${sd.waiting || 0}</td>
      <td class="right">${sd.tagged || 0}</td>
      <td class="right">${sd["Selected for BO QA "] || 0}</td>
      <td class="right">${sd.Valid || 0}</td>
      <td class="right">${h.completed || 0}</td>
      <td class="right">${h.qa_reviewed || 0}</td>
    </tr>`;
  }).join("");

  const agentsRows = (L.agents_worked || []).map(a =>
    `<tr><td class="agent-name">${esc(a.name)}</td><td>${esc(a.team || '—')}</td><td class="right">${a.records || 0}</td><td class="right">${a.qa_checked || 0}</td><td class="right">${a.qa_changed || 0}</td></tr>`
  ).join("") || '<tr><td colspan="5" class="empty">no agent attribution recorded</td></tr>';

  // QA reviewers — qa_reviewers is null on tasks whose latest row was recovered

  let qaReviewersHtml;

    const rev = L.qa_reviewers.map(q =>

            <tbody>${rev}</tbody>
          </table>`;
  } else {
    qaReviewersHtml = `<table>
            <tr><td>Reviewed</td><td class="right"><strong>${L.qa_reviewed || 0}</strong></td></tr>
            <tr><td>Changed</td><td class="right">${L.qa_changed || 0}</td></tr>
          </table>
          <div class="footer-note">Per-reviewer breakdown isn't recorded for this task (it predates the task-history ledger).</div>`;
  }

  drawer.innerHTML = `
    <div class="drawer-header">
      <button class="drawer-close" id="completedDrawerCloseBtn" title="Close">×</button>
      <h2>${esc(t.name)}</h2>
      <div>
        <span class="pill-inline ${L.is_sanctions ? 'bad' : 'good'}">${L.is_sanctions ? 'Sanctions' : 'Standard'}</span>
        <span class="pill-inline ${t.isCompleted ? 'good' : 'warn'}">${t.isCompleted ? 'Completed' : 'Open'}</span>
        <span class="small-mono"> · ${t.trueTotal.toLocaleString()} records · first seen ${esc(shortDate(t.firstSeen))} · last recorded ${esc(shortDate(t.lastRecorded))}</span>
      </div>
      <div style="margin-top:6px">${flagsHtml}</div>
    </div>
    <div class="drawer-body">

      <div class="panel">
        <h3>Lifecycle <span class="meta">received → assigned → completed</span></h3>
        <table>
          <tr><td>Received <span class="small-mono">client upload</span></td><td class="right">${esc(shortDate(L.date_first_seen))}</td></tr>
          <tr><td>Assigned <span class="small-mono">entered "waiting"</span></td><td class="right">${t.assignedDate ? esc(shortDate(t.assignedDate)) : '<span class="small-mono">—</span>'}</td></tr>
          <tr><td>Completed <span class="small-mono">crossed 95% Valid</span></td><td class="right">${t.isCompleted && L.end_time ? esc(shortDate(L.end_time)) : '<span class="small-mono">in progress</span>'}</td></tr>
          <tr><td>Turn-around</td><td class="right"><strong>${t.isCompleted && L.tat_hours != null ? esc(formatDuration(L.tat_hours)) : esc(formatDuration(ageHours(L.date_first_seen))) + ' open'}</strong></td></tr>
        </table>
        <div class="footer-note">"Assigned" is the first day the task had records in the "waiting" state (assigned to an agent, not yet started) — day-level, from the dashboard's snapshot history.</div>
      </div>

      <div class="panel">
        <h3>Lifecycle trace <span class="meta">day-by-day, from the history ledger</span></h3>
        <div class="chart-wrap"><canvas id="completedTraceChart"></canvas></div>
        <table style="margin-top:14px">
          <thead><tr><th>Date</th><th class="right">Records</th><th class="right">Waiting</th><th class="right">Tagged</th><th class="right">BO QA</th><th class="right">Valid</th><th class="right">Completed</th><th class="right">QA reviewed</th></tr></thead>
          <tbody>${traceRows}</tbody>
        </table>
        <div class="footer-note">Counts are the records visible in the dashboard's cache that day; the total shrinks as finished records age out — the task's true size is the peak (shown above).</div>
      </div>

      <div class="panel">
        <h3>Scorecard <span class="meta">from the latest recorded day</span></h3>
        <table>
          <tr><td>Properly completed</td><td class="right"><strong>${L.properly_completed || 0}</strong> / ${(L.total_records || 0).toLocaleString()}</td></tr>
          <tr><td>With company</td><td class="right">${L.with_company || 0}</td></tr>
          <tr><td>Without company</td><td class="right">${L.without_company || 0}</td></tr>
          <tr><td>Dead vessels</td><td class="right">${L.dead_vessels || 0}</td></tr>
          <tr><td>On reminder</td><td class="right">${L.with_reminder || 0}</td></tr>
        </table>
      </div>

      <div class="row equal">
        <div class="panel">
          <h3>Agents who worked this task</h3>
          <table>
            <thead><tr><th>Agent</th><th>Team</th><th class="right">Records</th><th class="right">Checked</th><th class="right">Changed</th></tr></thead>
            <tbody>${agentsRows}</tbody>
          </table>
        </div>
        <div class="panel">
          <h3>QA reviewers</h3>
          ${qaReviewersHtml}
        </div>
      </div>

    </div>
  `;

  // Lifecycle trace chart — stacked bar of status_distribution over time.
  const traceCtx = document.getElementById("completedTraceChart");
  if (traceCtx) {
    if (STATE.charts["completedTraceChart"]) STATE.charts["completedTraceChart"].destroy();
    STATE.charts["completedTraceChart"] = new Chart(traceCtx, {
      type: "bar",
      data: {
        labels: hist.map(h => shortDate(h.snapshot_date)),
        datasets: TRACE_STATUSES.map(([key, label, color]) => ({
          label,
          data: hist.map(h => (h.status_distribution || {})[key] || 0),
          backgroundColor: color,
        })),
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { x: { stacked: true }, y: { stacked: true } },
        plugins: { legend: { position: "bottom", labels: { font: { size: 10 } } } },
      },
    });
  }

  document.getElementById("completedDrawerCloseBtn").addEventListener("click", closeCompletedTaskDrawer);
  document.getElementById("completedDrawerBackdrop").addEventListener("click", closeCompletedTaskDrawer);

  drawer.classList.add("open");
  backdrop.classList.add("open");
}

function closeCompletedTaskDrawer() {
  document.getElementById("completedDrawer").classList.remove("open");
  document.getElementById("completedDrawerBackdrop").classList.remove("open");
  if (STATE.charts["completedTraceChart"]) { STATE.charts["completedTraceChart"].destroy(); delete STATE.charts["completedTraceChart"]; }
}

PAGE_RENDERERS.weekly = async function () {
  const root = document.getElementById("page-weekly");
  const todayISO = STATE.v2?.date || todayEat();
  // Default range: last 7 calendar days ending yesterday.
  const t0 = new Date(todayISO + "T00:00:00+03:00");
  const yest = new Date(t0); yest.setDate(t0.getDate() - 1);
  const start = new Date(t0); start.setDate(t0.getDate() - 7);
  const iso = (d) => d.toLocaleDateString("en-CA", { timeZone: "Africa/Nairobi" });
  const stored = JSON.parse(localStorage.getItem("wqa.weekly") || "{}");
  const rangeStart = stored.start || iso(start);
  const rangeEnd   = stored.end   || iso(yest);

  root.innerHTML = `
    <h3 style="font-size:18px;font-weight:600;color:var(--ink);margin-bottom:8px">Weekly Report</h3>
    <div class="controls-row">
      <label class="small-mono">Date range:</label>
      <input type="date" id="weeklyStart" value="${esc(rangeStart)}" style="font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:6px"/>
      <span class="small-mono">to</span>
      <input type="date" id="weeklyEnd" value="${esc(rangeEnd)}" style="font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:6px"/>
      <span class="small-mono">(default: last 7 days ending yesterday)</span>
    </div>
    <div id="weeklyBanner"></div>
    <div id="weeklyBody"><div class="empty">Loading snapshots…</div></div>
  `;
  document.getElementById("weeklyStart").addEventListener("change", onPickerChange);
  document.getElementById("weeklyEnd").addEventListener("change", onPickerChange);

  await renderWeeklyBody(rangeStart, rangeEnd);

  async function onPickerChange() {
    const s = document.getElementById("weeklyStart").value;
    const e = document.getElementById("weeklyEnd").value;
    if (!s || !e || s > e) return;
    localStorage.setItem("wqa.weekly", JSON.stringify({ start: s, end: e }));
    document.getElementById("weeklyBody").innerHTML = `<div class="empty">Loading snapshots…</div>`;
    await renderWeeklyBody(s, e);
  }
};

async function renderWeeklyBody(startISO, endISO) {
  await loadWeeklySnapshots(startISO, endISO);

  const todayISO = STATE.v2?.date;
  const days = _enumerateDays(startISO, endISO);
  // Roll up — both range days AND today (if today is outside range, still show its preview).
  const presentDays = days.filter(d => STATE.weeklySnapshots[d]);
  const missingDays = days.filter(d => !STATE.weeklySnapshots[d]);

  // Banner
  let bannerHTML = "";
  if (presentDays.length === 0 && STATE.v2) {
    bannerHTML = `<div class="alert-row warn" style="margin-bottom:14px"><span class="icon">!</span><div>No snapshots yet for ${esc(startISO)} → ${esc(endISO)}. Snapshots accumulate as each poll cycle fires (one per day). Showing today's data only as a preview.</div></div>`;
  } else {
    bannerHTML = `<div class="alert-row" style="margin-bottom:14px"><span class="icon">i</span><div>Showing <strong>${presentDays.length}</strong> day${presentDays.length === 1 ? "" : "s"} of data (from ${esc(presentDays[0] || startISO)} to ${esc(presentDays[presentDays.length - 1] || endISO)}). Missing days: <strong>${missingDays.length}</strong>${missingDays.length > 0 ? ` (${missingDays.slice(0, 3).map(esc).join(", ")}${missingDays.length > 3 ? "…" : ""})` : ""}.</div></div>`;

  // Source days: present range days. If empty, fall back to today.

// Client-side mirror of compute_weekly_rollup. Operates on STATE.weeklySnapshots
// for the listed days. Roster comes from STATE.roster.
function _rollupClientSide(dayList) {
  const snaps = dayList.map(d => [d, STATE.weeklySnapshots[d]]).filter(([_, s]) => s);
  const perDay = snaps.map(([day, aggs]) => {
    const tt = aggs.totals || {};
    const byAgent = aggs.by_agent || {};
    const activeAgents = Object.values(byAgent).filter(m =>
      (m.tagged_today || 0) + ((m.total_completions_today ?? m.total_completions) || 0) > 0).length;
    return {
      date: day,
      tagged: tt.tagged_today || 0,
      done: tt.done_today || 0,
      flow_a: (tt.flow_a_in_cache ?? tt.flow_a_count) || 0,
      flow_b: (tt.flow_b_in_cache ?? tt.flow_b_count) || 0,
      flow_c: (tt.flow_c_in_cache ?? tt.flow_c_count) || 0,
      total_completions: tt.total_completions || 0,
      active_agents: activeAgents,
      by_team: Object.fromEntries(Object.entries(aggs.by_team || {}).map(([t, m]) => [t, m.tagged_today || 0])),
    };
  });
  const totals = {
    tagged:            perDay.reduce((s, d) => s + d.tagged, 0),
    done:              perDay.reduce((s, d) => s + d.done, 0),
    flow_a:            perDay.reduce((s, d) => s + d.flow_a, 0),
    flow_b:            perDay.reduce((s, d) => s + d.flow_b, 0),
    flow_c:            perDay.reduce((s, d) => s + d.flow_c, 0),
    total_completions: perDay.reduce((s, d) => s + d.total_completions, 0),
    unique_imos_sum: snaps.reduce((s, [_, a]) => s + (a.totals?.unique_imos || 0), 0),
    qa_reviews:        snaps.reduce((s, [_, a]) => s + (a.qa_reviewers || []).reduce((x, r) => x + (r.reviews || 0), 0), 0),
    qa_changes:        snaps.reduce((s, [_, a]) => s + (a.qa_reviewers || []).reduce((x, r) => x + (r.changes || 0), 0), 0),
    active_agents_avg: perDay.length ? perDay.reduce((s, d) => s + d.active_agents, 0) / perDay.length : 0,
  };
  // Per-team rollup
  const perTeam = {};
  const agentTagged = {};
  for (const [_, aggs] of snaps) {
    for (const [a, m] of Object.entries(aggs.by_agent || {})) {
      agentTagged[a] = (agentTagged[a] || 0) + (m.tagged_today || 0);
    }
  }
  for (const team of Object.keys(STATE.roster || {})) {
    let records = 0, uniqueSum = 0;
    for (const [_, aggs] of snaps) {
      const tm = (aggs.by_team || {})[team];
      if (tm) { records += tm.tagged_today || 0; uniqueSum += tm.unique_imos || 0; }
    }
    const members = (STATE.roster[team].members || []).map(m => m.name);
    const memberSet = new Set(members);
    const ranked = Object.entries(agentTagged).filter(([n, _]) => memberSet.has(n)).sort((a, b) => b[1] - a[1]);
    const top = ranked.length && ranked[0][1] > 0 ? { name: ranked[0][0], records: ranked[0][1] } : null;
    perTeam[team] = { records, unique_imos_sum: uniqueSum, top_performer: top };
  }
  // Agents not working
  const anw = [];
  for (const team of Object.keys(STATE.roster || {})) {
    for (const member of (STATE.roster[team].members || [])) {
      const missing = [];
      for (const [day, aggs] of snaps) {
        const rec = (aggs.by_agent || {})[member.name];
        if (!rec || ((rec.tagged_today || 0) + ((rec.total_completions_today ?? rec.total_completions) || 0)) === 0) {
          missing.push(day);
        }
      }
      if (missing.length > 0) {
        anw.push({ name: member.name, team, days_missed: missing.length, missing_dates: missing });
      }
    }
  }
  anw.sort((a, b) => b.days_missed - a.days_missed || a.team.localeCompare(b.team) || a.name.localeCompare(b.name));
  return {
    date_range: { start: dayList[0], end: dayList[dayList.length - 1] },
    days_with_data: perDay.length,
    totals,
    per_day: perDay,
    per_team_rollup: perTeam,
    agents_not_working: anw,
  };
}

PAGE_RENDERERS.pipeline = function () {

  // Per-team rows: only teams with completions today, most completions first.
  const teamRows = Object.entries(ltt.by_team || {})

      <td class="right">${hrs(s.p50)}</td>
      <td class="right">${hrs(s.p90)}</td>
    </tr>`).join("");

  // Sanctions vs non-sanctions cohorts. by_cohort omits count=0 cohorts (same
  // empty convention as by_team), so always render both fixed rows and default
  // a missing cohort to count 0 / "—". by_cohort itself is absent on aggregates
  // written before the split shipped → single empty-state row.
  const bc = ltt.by_cohort;
  const cohortRow = (label, key) => {
    const s = bc && bc[key];
    return `<tr>
      <td><strong>${label}</strong></td>
      <td class="right">${s ? s.count : 0}</td>
      <td class="right">${hrs(s && s.p50)}</td>
      <td class="right">${hrs(s && s.p90)}</td>
    </tr>`;
  };
  const cohortRows = bc
    ? cohortRow("Sanctions", "sanctions") + cohortRow("Non-sanctions", "non_sanctions")
    : `<tr><td colspan="4" class="empty">No cohort breakdown in this aggregate yet.</td></tr>`;

  // Today's pipeline flow funnel — split tagged_today into the Flow Framework
  // v3 stages (data already on totals; no fetch). Computed here, before the
  // template, so the chart (below) and the DOM stage-list (in the template)
  // read one source of truth. Zero/missing stages stay at 0 (0%), never
  // hidden — a zero stage is itself a signal.
  const fTot = STATE.v2?.totals || {};
  const fNum = (v) => (typeof v === "number" ? v : 0);
  const fTagged = fNum(fTot.tagged_today);
  const funnelStages = [
    { name: "Tagged today",         value: fTagged },
    { name: "In BO QA (Flow B)",    value: fNum(fTot.flow_b_today) },
    { name: "Completed (Flow A+C)", value: fNum(fTot.flow_a_today) + fNum(fTot.flow_c_today) },
    { name: "QA reviewed (Flow C)", value: fNum(fTot.flow_c_today) },
  ];
  const funnelPct = (v) => fTagged > 0 ? Math.round(v / fTagged * 100) : 0;
  const funnelList = funnelStages.map(s => `<li style="margin-bottom:10px">
            <strong>${esc(s.name)}</strong>
            <div class="small-mono">${s.value.toLocaleString()} records · ${funnelPct(s.value)}% of tagged today</div>
          </li>`).join("");

  root.innerHTML = `
    <div class="kpis">
      <div class="kpi hero">
        <div class="label">Lead time p50 (today)</div>
        <div class="value">${hrsKpi(ltt.p50)}</div>
        <div class="delta">median start_tagging → completion</div>
      </div>
      <div class="kpi">
        <div class="label">Lead time p90 (today)</div>

        <div class="delta">90th percentile</div>

      </div>
    </div>
    <div class="panel">
      <h3>Per-team lead time <span class="meta">records completed today, start_tagging → completion</span></h3>
      <table>
        <thead><tr><th>Team</th><th class="right">Completed today</th><th class="right">p50 (h)</th><th class="right">p90 (h)</th></tr></thead>
        <tbody>${teamRows || `<tr><td colspan="4" class="empty">No records completed yet today.</td></tr>`}</tbody>
      </table>
    </div>
    <div class="panel">
      <h3>Sanctions vs non-sanctions <span class="meta">records completed today</span></h3>
      <table>
        <thead><tr><th>Cohort</th><th class="right">Completed today</th><th class="right">p50 (h)</th><th class="right">p90 (h)</th></tr></thead>
        <tbody>${cohortRows}</tbody>
      </table>
      <div class="footer-note">Sanctions tasks require 100% QA per SOP — watch this row for material drift vs non-sanctions.</div>
    </div>
    <div class="panel">
      <h3>Today's pipeline flow <span class="meta">tagged today by stage reached</span></h3>
      <div style="display:flex; gap:18px; align-items:flex-start">
        <div class="chart-wrap" style="flex:1; min-width:0"><canvas id="chart-today-funnel"></canvas></div>
        <ul style="flex:0 0 220px; list-style:none; margin:0; padding:0">
          ${funnelList}
        </ul>
      </div>
      <div class="footer-note">Stages aren't strictly sequential — Flow A bypasses BO QA, Flow D (in-flight) isn't shown. See Flow Framework v3 in CLAUDE.md for the definitions.</div>
    </div>
    <div class="panel">
      <h3>7-day p50 lead-time trend <span class="meta">from snapshots</span></h3>
      <div class="chart-wrap"><canvas id="chart-7day-leadtime"></canvas></div>
      <div class="footer-note">p50 lead time = median time from start_tagging to completion. Derived from daily snapshots in Supabase Storage (snapshots/YYYY-MM-DD.json). Gray bars = no snapshot (or no lead-time data) for that day.</div>
    </div>
    <div class="panel">
      <h3>Stage breakdown <span class="meta">all cached records, from aggregates_v2.totals.lead_time_seconds</span></h3>
      <table>
        <tr><td>created → tagged (p50)</td><td class="right">${hrs(stage.created_to_tagged_p50)}</td></tr>

      </table>
      <div class="footer-note">Per-stage p50/p90 in hours, across the whole cache window (not today-scoped) — shows where pipeline time accrues.</div>
    </div>
  `;

  // Today's pipeline flow funnel — one bar per Flow Framework v3 stage,
  // sharing the funnelStages/funnelPct computed above with the DOM stage-list.
  // Single color + descending counts give the funnel feel; the count/% now
  // live in the list beside the chart, so y-axis labels are just stage names.
  (() => {
    const ctx = document.getElementById("chart-today-funnel");
    if (!ctx) return;
    if (STATE.charts["chart-today-funnel"]) STATE.charts["chart-today-funnel"].destroy();
    STATE.charts["chart-today-funnel"] = new Chart(ctx, {
      type: "bar",
      data: {
        labels: funnelStages.map(s => s.name),
        datasets: [{
          label: "records",
          data: funnelStages.map(s => s.value),
          backgroundColor: "#3d63dd",
        }],
      },
      options: {
        indexAxis: "y",
        responsive: true,
        maintainAspectRatio: false,
        scales: { x: { beginAtZero: true } },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: c => {
            const v = funnelStages[c.dataIndex].value;
            return `${v.toLocaleString()} records (${funnelPct(v)}% of tagged today)`;
          }}},
        },
      },
    });
  })();

  // 7-day p50 lead-time chart — mirrors the Daily Intake 7-day pattern: fetch
  // lead_time_today.p50 from the daily snapshots in Supabase Storage, in
  // parallel. Days whose snapshot is missing (or predates the lead_time_today
  // key) render as a gray zero bar with a "no snapshot" tooltip.
  (async () => {
    const today = todayEat();
    const dates = [];
    for (let i = 6; i >= 0; i--) {
      const dt = new Date(today + "T00:00:00+03:00");
      dt.setDate(dt.getDate() - i);
      dates.push(dt.toLocaleDateString("en-CA", { timeZone: "Africa/Nairobi" }));
    }
    const last7 = await Promise.all(dates.map(async d => {
      const snap = await readJson(`.poll_work/snapshots/${d}.json`);
      const p50 = snap?.lead_time_today?.p50;   // int seconds, or undefined
      return { d, h: (typeof p50 === "number") ? +(p50 / 3600).toFixed(1) : null };  // null = no data

        datasets: [{
          label: "p50 lead time (h)",

    });
  })();
};

  const noImoEl = document.getElementById("caseNoImoTable");
  if (gapEl)  gapEl.innerHTML  = _caseTableHtml(gaps);
  if (noImoEl) noImoEl.innerHTML = _caseTableHtml(noImo);
  const gc = document.getElementById("caseGapCount");  if (gc) gc.textContent  = `${gaps.length} shown`;
  const nc = document.getElementById("caseNoImoCount"); if (nc) nc.textContent = `${noImo.length} shown`;
}

// 7-day case-type heatmap: rows = the 11 comment values, columns = the last 7
// EAT days, each cell = that comment's count that day. Read from the daily
// snapshots' totals.comment_distribution (same approach as the Daily Intake
// 7-day chart). Whole-team — per-team history isn't in old snapshots. Days with
// no snapshot render as a muted blank cell.
async function renderCaseTrendHeatmap() {
  const wrap = document.getElementById("caseTrendHeatmap");
  if (!wrap) return;
  const today = todayEat();
  const dates = [];
  for (let i = 6; i >= 0; i--) {
    const dt = new Date(today + "T00:00:00+03:00");
    dt.setDate(dt.getDate() - i);
    dates.push(dt.toLocaleDateString("en-CA", { timeZone: "Africa/Nairobi" }));
  }
  const snaps = await Promise.all(dates.map(async d => {
    const snap = await readJson(`.poll_work/snapshots/${d}.json`);
    return { d, cd: snap?.totals?.comment_distribution || null };  // null = no snapshot
  }));
  let max = 1;
  for (const s of snaps) if (s.cd) for (const c of CASE_COMMENT_VALUES) max = Math.max(max, s.cd[c] || 0);
  const shortDay = d => new Date(d + "T00:00:00+03:00").toLocaleDateString("en-GB", { timeZone: "Africa/Nairobi", day: "numeric", month: "short" });
  const headerCells = snaps.map(s => `<div class="header">${esc(shortDay(s.d))}</div>`).join("");
  const rows = CASE_COMMENT_VALUES.map(c => {
    const cells = snaps.map(s => {
      if (!s.cd) return `<div class="cell z" title="${esc(s.d)}: no snapshot"></div>`;
      const v = s.cd[c] || 0;
      if (v === 0) return `<div class="cell z" title="${esc(c)} · ${esc(s.d)}: 0">0</div>`;
      const alpha = (0.2 + 0.8 * (v / max)).toFixed(2);
      return `<div class="cell" style="background:rgba(20,80,179,${alpha})" title="${esc(c)} · ${esc(s.d)}: ${v}">${v}</div>`;
    }).join("");
    return `<div class="label">${esc(c)}</div>${cells}`;
  }).join("");
  wrap.innerHTML = `<div class="heatmap" style="grid-template-columns: 280px repeat(7, minmax(40px, 1fr));">
    <div class="header"></div>${headerCells}
    ${rows}
  </div>`;
}

// ============================================================================
//  Init

function noDataHtml(msg) {
  return `<div class="empty-state"><div class="title">No data</div>${esc(msg)}</div>`;
}

async function init() {
  const ok = await loadAll();
  if (!ok) return;
  await computeStaleTasks();
  renderNav();
  renderFreshness();
  goto(STATE.currentPage);
}

// Reusable refresh-with-feedback wrapper — mirror of deploy/index.html.
// 500ms debounce, spinning ↻ icon, pill state changes during/after refresh,
// 2s green success flash settling to "Synced just now", 5s red error flash
// reverting to prior pill state on failure.
const _refreshDebounce = new WeakMap();
async function runRefresh({ btn, pillEl, pillTextEl, action, idleLabel = "Refresh" }) {
  const now = Date.now();
  const last = _refreshDebounce.get(btn) || 0;
  if (now - last < 500) return;
  _refreshDebounce.set(btn, now);

  const priorPillClass = pillEl ? pillEl.className : null;
  const priorPillText  = pillTextEl ? pillTextEl.textContent : null;

  btn.disabled = true;
  btn.innerHTML = `<span class="spinning-icon">↻</span> Refreshing…`;
  if (pillEl && pillTextEl) {
    pillEl.className = "pill";
    pillEl.querySelector(".dot")?.classList.add("refreshing");
    pillTextEl.textContent = "Refreshing…";
  }

  try {
    await action();
    btn.disabled = false;
    btn.textContent = idleLabel;
    if (pillEl && pillTextEl) {
      pillEl.className = "pill success";
      pillEl.querySelector(".dot")?.classList.remove("refreshing");
      pillTextEl.textContent = "Updated just now";
      setTimeout(() => {
        if (pillTextEl.textContent === "Updated just now") {
          pillEl.className = "pill";
          pillTextEl.textContent = "Synced just now";
        }
      }, 2000);
    }
  } catch (e) {
    console.error("refresh failed:", e);
    btn.disabled = false;
    btn.textContent = idleLabel;
    if (pillEl && pillTextEl) {
      pillEl.className = "pill error";
      pillEl.querySelector(".dot")?.classList.remove("refreshing");
      pillTextEl.textContent = "Refresh failed — retry?";
      setTimeout(() => {
        if (pillTextEl.textContent === "Refresh failed — retry?") {
          pillEl.className = priorPillClass || "pill";
          pillTextEl.textContent = priorPillText || "loading…";
        }
      }, 5000);
    }
  }
}

document.getElementById("refreshBtn").addEventListener("click", () => {
  runRefresh({
    btn:         document.getElementById("refreshBtn"),
    pillEl:      document.getElementById("freshness"),
    pillTextEl:  document.getElementById("freshnessText"),
    action:      init,
    idleLabel:   "Refresh",
  });
});

// Auto-refresh ownership_completions when the tab regains focus.
// Mirror of deploy/index.html — see that file for the full rationale.
let _lastVisibilityRefresh = 0;
document.addEventListener("visibilitychange", async () => {
  if (document.visibilityState !== "visible") return;
  const now = Date.now();
  if (now - _lastVisibilityRefresh < 30_000) return;
  _lastVisibilityRefresh = now;
  if (!STATE.completionsDate) return;
  await loadCompletions(STATE.completionsDate);
  if (STATE.currentPage === "hourly") {
    const renderer = PAGE_RENDERERS[STATE.currentPage];
    if (renderer) renderer();
  }
});

init();
</script>
