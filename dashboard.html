<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Windward Ownership QA — Operations Hub</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
<link href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css" rel="stylesheet">
<!-- Supabase JS client — used for the new ownership_completions reads only.
     Anon key is safe to embed; the table is read-only for anon (the
     detector writes via the service_role key server-side). -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    color-scheme: light;
    /* Neutral palette — calm, slightly cool surfaces */
    --bg:#f5f6f8; --surface:#ffffff; --border:#e7e9ef; --soft:#f2f4f7; --ink:#1b2027; --muted:#69707d;
    /* Semantic — desaturated, sophisticated (kept legible on white and on their *-bg tints) */
    --good:#1a7a55; --good-bg:#e7f3ed; --warn:#9a6a12; --warn-bg:#f7efda; --bad:#bb4338; --bad-bg:#f9e8e6;
    --accent:#3d63dd; --link:#2f5fd0;
    /* Soft layered shadows — depth comes from these, not from heavy borders */
    --shadow-sm:0 1px 2px rgba(16,24,40,0.04), 0 1px 3px rgba(16,24,40,0.05);
    --shadow-md:0 4px 12px rgba(16,24,40,0.06), 0 2px 4px rgba(16,24,40,0.04);
    --shadow-lg:0 16px 40px rgba(16,24,40,0.12), 0 4px 12px rgba(16,24,40,0.06);
    /* Radius + spacing scales */
    --radius-sm:8px; --radius-md:12px; --radius-lg:16px;
    --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-5:24px; --space-6:32px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--ink); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  .app { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
  /* Left nav — dark, calm, considered */
  nav.side { background: #181a20; color: #abb1bd; padding: 16px 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  nav.side h1 { font-size: 12px; padding: 4px 18px 16px; margin: 0; letter-spacing: 0.08em; text-transform: uppercase; color: #767d8c; font-weight: 600; }
  nav.side ul { list-style: none; padding: 0; margin: 0; }
  nav.side li.nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #5f6675; font-weight: 600; padding: 16px 18px 5px; margin: 0; pointer-events: none; user-select: none; }
  nav.side li button { width: 100%; text-align: left; background: none; border: 0; color: #abb1bd; padding: 8px 18px; font-size: 13px; cursor: pointer; font-family: inherit; border-left: 2px solid transparent; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease; }
  nav.side li button:hover { background: #212531; color: #f3f5f9; border-left-color: #3a4150; }
  nav.side li button.active { background: #262b37; color: #f3f5f9; border-left-color: var(--accent); font-weight: 500; }
  nav.side li button.active:hover { border-left-color: var(--accent); }
  nav.side li button .tag { font-size: 9px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; background: #2c313d; padding: 2px 6px; border-radius: 999px; color: #8b93a3; }
  nav.side li button .tag.stub { background: #3a3320; color: #e8c479; }
  nav.side li button .tag.live { background: #1d3640; color: #79cfd6; }
  nav.side .nav-footer { padding: 16px 18px; font-size: 11px; color: #5b6271; border-top: 1px solid #262a33; margin-top: 16px; line-height: 1.5; }

  /* Main */
  main { padding: 0; min-width: 0; }
  .topbar { background: rgba(255,255,255,0.82); backdrop-filter: saturate(180%) blur(8px); -webkit-backdrop-filter: saturate(180%) blur(8px); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; gap: 14px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .topbar h2 { font-size: 17px; margin: 0; letter-spacing: -0.015em; font-weight: 650; }
  .topbar .controls { display: flex; gap: 10px; align-items: center; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 11px; border-radius: 999px; font-size: 12px; background: var(--soft); border: 1px solid var(--border); color: var(--muted); transition: background 0.15s ease, color 0.15s ease; }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--good); }
  .pill.stale .dot { background: var(--warn); }
  .pill.alert .dot { background: var(--bad); }
  /* Refresh button feedback states — applied while a refresh is in flight and during
     the success/error flash that follows. */
  .pill .dot.refreshing { background: var(--warn); animation: pulse 1.2s ease-in-out infinite; }
  .pill.success { background: var(--good-bg); color: var(--good); transition: background 0.15s; }
  .pill.success .dot { background: var(--good); }
  .pill.error { background: var(--bad-bg); color: var(--bad); transition: background 0.15s; }
  .pill.error .dot { background: var(--bad); }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes refresh-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .spinning-icon { display: inline-block; animation: refresh-spin 0.8s linear infinite; }
  button.btn { font-family: inherit; font-size: 12px; font-weight: 500; padding: 6px 13px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; color: var(--ink); box-shadow: var(--shadow-sm); transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.06s ease; }
  button.btn:hover { background: var(--soft); box-shadow: var(--shadow-md); }
  button.btn:active { transform: translateY(0.5px); }
  button.btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  button.btn.primary:hover { background: #2b323d; }

  .page { padding: 22px 24px 56px; max-width: 1500px; }
  .page > h3 { font-size: 12px; color: var(--muted); margin: 4px 0 14px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }

  /* KPI cards — shadow-led depth, hairline border, subtle hover lift */
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; box-shadow: var(--shadow-sm); transition: box-shadow 0.18s ease, transform 0.18s ease; }
  .kpi:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .kpi .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
  .kpi .value { font-size: 28px; font-weight: 650; margin-top: 4px; letter-spacing: -0.02em; color: var(--ink); }
  .kpi .delta { font-size: 11px; color: var(--muted); margin-top: 3px; }
  /* Hero — the single headline KPI: spans two columns, dominant value, resting elevation. */
  .kpi.hero { grid-column: span 2; padding: 18px 22px; box-shadow: var(--shadow-md); }
  .kpi.hero .value { font-size: 46px; font-weight: 700; margin-top: 6px; line-height: 1.05; }
  .kpi.hero .delta { font-size: 12px; margin-top: 4px; }
  .kpi.hero:hover { box-shadow: var(--shadow-lg); }
  /* Secondary — compact, muted, recessive: contextual / low-priority metrics that should
     sit behind the operational ones. Still flows in the same .kpis auto-fit grid. */
  .kpi.secondary { background: var(--soft); box-shadow: none; }
  .kpi.secondary .value { font-size: 20px; font-weight: 600; color: var(--muted); margin-top: 2px; }
  .kpi.secondary:hover { box-shadow: var(--shadow-sm); transform: none; }
  /* Semantic attention — restrained. .good stays calm (the coloured value is enough);
     .warn / .bad get a thin inset left stripe (no reflow) so cards needing attention pop. */
  .kpi.good .value { color: var(--good); }
  .kpi.warn .value { color: var(--warn); }
  .kpi.bad .value { color: var(--bad); }
  .kpi.warn { box-shadow: inset 3px 0 0 var(--warn), var(--shadow-sm); }
  .kpi.bad  { box-shadow: inset 3px 0 0 var(--bad),  var(--shadow-sm); }
  .kpi.warn:hover { box-shadow: inset 3px 0 0 var(--warn), var(--shadow-md); }
  .kpi.bad:hover  { box-shadow: inset 3px 0 0 var(--bad),  var(--shadow-md); }

  /* Panels — shadow-led; a restrained shadow deepen on hover (no transform here, to
     avoid touching the sticky/frozen scroll regions some panels contain) */
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 18px 20px; margin-bottom: 16px; box-shadow: var(--shadow-sm); transition: box-shadow 0.18s ease; }
  .panel:hover { box-shadow: var(--shadow-md); }
  .panel h3 { font-size: 14px; margin: 0 0 12px; font-weight: 600; letter-spacing: -0.01em; display: flex; justify-content: space-between; align-items: center; }
  .panel h3 .meta { font-size: 11px; color: var(--muted); font-weight: 400; letter-spacing: 0; }
  .panel .empty { padding: 24px; text-align: center; color: var(--muted); font-style: italic; }
  /* Section header — structural divider between content groups (Phase 6).
     Larger/stronger than a panel h3, quieter than the page title; hairline rule. */
  .section-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; font-size: 15px; font-weight: 650; letter-spacing: -0.012em; color: var(--ink); margin: 30px 0 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .section-head:first-child { margin-top: 4px; }
  .section-head .meta { font-size: 11px; color: var(--muted); font-weight: 400; letter-spacing: 0; white-space: nowrap; }

  .row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; align-items: start; }
  .row.equal { grid-template-columns: 1fr 1fr; }
  @media (max-width: 1100px) { .row, .row.equal { grid-template-columns: 1fr; } }

  /* Operational flow (Overview) — a stage strip + a composition bar, calm & shadow-led */
  .flow-strip { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .flow-node { flex: 1 1 140px; min-width: 130px; padding: 4px 6px; }
  .flow-node .flow-count { font-size: 30px; font-weight: 650; letter-spacing: -0.02em; color: var(--ink); line-height: 1.05; }
  .flow-node .flow-name { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 600; margin-top: 5px; }
  .flow-node .flow-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .flow-node .flow-extra { font-size: 11px; color: var(--warn); font-weight: 500; margin-top: 3px; }
  .flow-connector { flex: 0 0 auto; color: #c2c7d0; font-size: 20px; line-height: 1; padding: 0 2px; align-self: center; }
  .flow-bar-wrap { margin-top: 18px; }
  .flow-bar { display: flex; height: 10px; border-radius: 999px; overflow: hidden; background: var(--soft); }
  .flow-seg { height: 100%; transition: width 0.3s ease; }
  .flow-seg.a, .flow-legend .swatch.a { background: #aab2c0; }   /* Flow A — done, no QA (neutral) */
  .flow-seg.b, .flow-legend .swatch.b { background: var(--accent); } /* Flow B — in BO QA */
  .flow-seg.c, .flow-legend .swatch.c { background: var(--good); }   /* Flow C — done after QA */
  .flow-seg.d, .flow-legend .swatch.d { background: var(--warn); }   /* Flow D — in flight (bottleneck cue) */
  .flow-legend { display: flex; flex-wrap: wrap; gap: 8px 18px; margin-top: 12px; font-size: 12px; }
  .flow-legend .item { display: flex; align-items: center; gap: 6px; color: var(--muted); }
  .flow-legend .swatch { width: 9px; height: 9px; border-radius: 3px; flex: 0 0 auto; }
  .flow-legend .lname { color: var(--ink); }
  .flow-legend .lcount { color: var(--muted); font-variant-numeric: tabular-nums; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  th { font-weight: 600; color: var(--muted); background: var(--soft); text-transform: uppercase; font-size: 10px; letter-spacing: 0.05em; }
  tbody tr { transition: background 0.12s ease; }
  tbody tr:hover { background: var(--soft); }
  td.right, th.right { text-align: right; }
  td.mono { font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: var(--muted); }
  td .pill-inline { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; }
  td .pill-inline.good { background: var(--good-bg); color: var(--good); }
  td .pill-inline.warn { background: var(--warn-bg); color: var(--warn); }
  td .pill-inline.bad { background: var(--bad-bg); color: var(--bad); }

  /* Heatmap */
  .heatmap, .hourly-heatmap { display: grid; gap: 2px; font-size: 11px; overflow-x: auto; }
  .heatmap .cell, .hourly-heatmap .cell { padding: 5px 4px; text-align: center; border-radius: 4px; min-height: 24px; font-weight: 500; color: #fff; }
  .heatmap .label, .hourly-heatmap .label { background: transparent; color: var(--ink); text-align: left; padding: 5px 6px; font-weight: 500; white-space: nowrap; }
  .heatmap .header, .hourly-heatmap .header { background: transparent; color: var(--muted); text-align: center; font-size: 10px; padding: 4px; }
  .heatmap .cell.z, .hourly-heatmap .cell.z { background: #eceef2; color: #aab0bd; }
  .hourly-team-label { background: #181a20; color: #fff; padding: 5px 10px; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  .hourly-team-fill { background: #181a20; }
  .hourly-spacer { grid-column: 1 / -1; height: 6px; }

  /* Tasks page */
  .sortable th { cursor: pointer; user-select: none; }
  .sortable th:hover { background: #e9ebf0; }
  .sortable th .sort-ind { color: var(--muted); font-size: 9px; margin-left: 3px; }
  .task-name { font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: var(--link); cursor: pointer; transition: color 0.12s ease; }
  .task-name:hover { text-decoration: underline; }
  .flag-pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; margin: 0 3px 2px 0; }
  .flag-pill.red   { background: var(--bad-bg);  color: var(--bad);  }
  .flag-pill.amber { background: var(--warn-bg); color: var(--warn); }
  .flag-pill.gray  { background: var(--soft);    color: var(--muted); }

  /* The Tasks table is its own scroll region: it scrolls horizontally (to reach the
     Turn-around / Flags columns) and vertically (through the rows) while the header
     row and the Task-name column stay pinned. The bounded max-height is essential —
     an overflow container with no height cap lets the page (not the table) own the
     scroll, and position:sticky then has nothing to resolve against. That was the
     PR #28 regression: both sticky directions only work because they resolve against
     this one bounded container. The exact height is set at runtime by fitTableHeight()
     in JS, which measures the table down to the bottom of the viewport so it fills the
     screen on any size (replacing the old fixed calc(100vh - Npx) guess). The 70vh here
     is only a fallback for the case where JS hasn't run. */
  #tasksTable { overflow: auto; max-height: 70vh; }
  #tasksTable table { font-size: 12px; }
  #tasksTable th, #tasksTable td { padding: 5px 8px; white-space: nowrap; }
  #tasksTable thead th {
    position: sticky;
    top: 0; /* sticky resolves against the #tasksTable scroll container, so the offset is 0 */
    z-index: 3;
    background: var(--soft);
  }
  /* Freeze the Task-name column so it stays readable while the wide table
     scrolls horizontally. Opaque backgrounds hide cells sliding underneath. */
  #tasksTable tbody td:first-child,
  #tasksTable thead th:first-child {
    position: sticky;
    left: 0;
    z-index: 2;
    background: var(--surface);
  }
  #tasksTable thead th:first-child { z-index: 4; background: var(--soft); } /* top-left corner: above row header + frozen column */
  #tasksTable tbody tr:hover td:first-child { background: var(--soft); }     /* keep hover shade consistent on the frozen cell */

  /* The New Companies table is its own scroll region — same pattern as #tasksTable
     above (PR #50/#51). It previously had no scroll container and no sticky header, so
     the column headers scrolled out of view on the long (up to 500-row) list. The bounded
     max-height is what makes position:sticky work: without a height cap the page owns the
     scroll and the sticky header silently breaks (the PR #28 regression). The exact height
     is set at runtime by fitTableHeight() in JS, which measures the table down to the
     bottom of the viewport (adapting to the topbar wrap and the truncated alert) so it
     fills the screen on any size — replacing the old fixed calc(100vh - Npx) guess. The
     70vh here is only a fallback for the case where JS hasn't run. */
  #newCompaniesTable { overflow: auto; max-height: 70vh; }
  #newCompaniesTable thead th {
    position: sticky;
    top: 0; /* sticky resolves against the #newCompaniesTable scroll container */
    z-index: 3;
    background: var(--soft);
  }
  #newCompaniesTable tbody td:first-child,
  #newCompaniesTable thead th:first-child {
    position: sticky;
    left: 0;
    z-index: 2;
    background: var(--surface);
  }
  #newCompaniesTable thead th:first-child { z-index: 4; background: var(--soft); } /* top-left corner: above row header + frozen column */
  #newCompaniesTable tbody tr:hover td:first-child { background: var(--soft); }     /* keep hover shade consistent on the frozen cell */

  /* Completed Tasks — its own bounded scroll region, same pattern as
     #tasksTable / #newCompaniesTable: sticky header + frozen first column. The
     bounded max-height is what makes position:sticky resolve against the scroll
     container; fitTableHeight() sets the real height at runtime and the 70vh is
     only the fallback for before JS has run. */
  #completedTable { overflow: auto; max-height: 70vh; }
  #completedTable thead th {
    position: sticky;
    top: 0; /* sticky resolves against the #completedTable scroll container */
    z-index: 3;
    background: var(--soft);
  }
  #completedTable tbody td:first-child,
  #completedTable thead th:first-child {
    position: sticky;
    left: 0;
    z-index: 2;
    background: var(--surface);
  }
  #completedTable thead th:first-child { z-index: 4; background: var(--soft); } /* top-left corner: above row header + frozen column */
  #completedTable tbody tr:hover td:first-child { background: var(--soft); }     /* keep hover shade consistent on the frozen cell */

  /* Case Scenarios — the two section tables share this scroll-region pattern
     (same as #newCompaniesTable / #tasksTable): sticky header + frozen first
     column. Fixed ~40vh each so neither section dominates the page. */
  .case-scroll { overflow: auto; max-height: 40vh; }
  .case-scroll thead th { position: sticky; top: 0; z-index: 3; background: var(--soft); }
  .case-scroll tbody td:first-child,
  .case-scroll thead th:first-child { position: sticky; left: 0; z-index: 2; background: var(--surface); }
  .case-scroll thead th:first-child { z-index: 4; background: var(--soft); } /* top-left corner */
  .case-scroll tbody tr:hover td:first-child { background: var(--soft); }     /* hover consistency on the frozen cell */
  /* Hourly Output — its own bounded scroll region so the hour-number header
     row stays pinned while the agent rows scroll. Same pattern as #tasksTable
     / #newCompaniesTable / .case-scroll: position:sticky needs a height-capped
     scroll container to resolve against (the PR #28 regression). The 70vh is a
     fallback; fitTableHeight() sets the real height at runtime. */
  #hourlyGrid { overflow: auto; max-height: 70vh; }
  /* Let #hourlyGrid own the scroll so the sticky header resolves against it.
     .hourly-heatmap otherwise becomes its own scroll container via the shared
     overflow-x:auto rule, which would break the sticky offset. */
  #hourlyGrid .hourly-heatmap { overflow: visible; }
  #hourlyGrid .hourly-heatmap .header {
    position: sticky;
    top: 0;                      /* resolves against #hourlyGrid */
    z-index: 3;
    background: var(--ink);      /* dark header bar — opaque, clearly not a data cell */
    color: #fff;
    font-weight: 700;
    font-size: 12px;             /* up from the shared 10px so hours read as headers */
    border-bottom: 2px solid var(--accent);  /* crisp accent edge, separates it from the dark team bars */
  }

  .drawer-backdrop { position: fixed; inset: 0; background: rgba(17,22,30,0.32); opacity: 0; pointer-events: none; transition: opacity 180ms ease; z-index: 99; }
  .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 70vw; max-width: 1100px; background: var(--surface); border-left: 1px solid var(--border); box-shadow: -16px 0 48px rgba(16,24,40,0.18); overflow-y: auto; transform: translateX(100%); transition: transform 220ms ease; z-index: 100; }
  .drawer.open { transform: translateX(0); }
  .drawer-header { padding: 16px 22px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .drawer-header h2 { margin: 0 0 4px; font-size: 16px; font-family: ui-monospace, Menlo, monospace; }
  .drawer-close { float: right; background: none; border: 0; font-size: 22px; cursor: pointer; color: var(--muted); margin-top: -4px; transition: color 0.12s ease; }
  .drawer-close:hover { color: var(--ink); }
  .drawer-body { padding: 16px 22px 32px; }

  /* Charts */
  .chart-wrap { position: relative; height: 280px; }
  .chart-wrap.small { height: 160px; }

  /* Alerts */
  .alert-row { padding: 10px 13px; border-radius: var(--radius-sm); background: var(--soft); margin-bottom: 6px; display: flex; gap: 10px; align-items: center; }
  .alert-row.warn { background: var(--warn-bg); color: var(--warn); }
  .alert-row.bad { background: var(--bad-bg); color: var(--bad); }
  .alert-row .icon { font-weight: 700; font-size: 12px; padding: 2px 6px; border-radius: 999px; background: rgba(16,24,40,0.07); }

  .controls-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  select { font-family: inherit; font-size: 13px; padding: 7px 12px; border: 1px solid var(--border); background: var(--surface); border-radius: var(--radius-sm); color: var(--ink); cursor: pointer; box-shadow: var(--shadow-sm); transition: border-color 0.15s ease, box-shadow 0.15s ease; }
  select:hover { border-color: #d4d8e0; }
  select:focus-visible, button.btn:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(61,99,221,0.18); }

  .stub-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 28px 24px; text-align: center; box-shadow: var(--shadow-sm); }
  .stub-card h2 { margin: 0 0 8px; font-size: 18px; letter-spacing: -0.01em; }
  .stub-card p { color: var(--muted); max-width: 540px; margin: 0 auto 16px; }

// ============================================================================
if (window.Chart) { try {
  const CD = Chart.defaults;
  CD.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";

  CD.color = "#69707d";                 /* --muted: ticks, legend, default text */
  CD.borderColor = "#e7e9ef";           /* --border */
  CD.animation.duration = 320;
  CD.animation.easing = "easeOutQuart";

  /* Legend — refined, point-style markers, comfortable padding */

  /* Tooltip — modern dark, rounded, generous padding */

  /* Bars — rounded tops, sensible thickness/spacing */

  Object.assign(CD.datasets.bar, { maxBarThickness: 46, categoryPercentage: 0.7, barPercentage: 0.9 });
  /* Lines, points, arcs — calm */

  Object.assign(CD.elements.point, { radius: 2.5, hoverRadius: 4, hitRadius: 8 });

  /* Axes & gridlines last — clean Stripe-analytics feel: faint horizontal guides, no
     heavy axis border line, tidy ticks. Defensive across Chart.js v4 scale-default paths. */

// Supabase client for the ownership_completions reads. Same anon-key

const SUPABASE_URL      = "https://isccbmgjgtdosiccstcp.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_M4_8MhW0xVUC6HEwp57sow_Yims-p3k";

// ============================================================================
//  Data loaders — JSON via bash cat, live via Airtable MCP
// ============================================================================
function unwrapText(r) {
  if (!r) return "";
  if (typeof r === "string") return r;
  if (r.content && Array.isArray(r.content)) {
    for (const c of r.content) if (c.type === "text") return c.text;
  }
  if (r.output) return typeof r.output === "string" ? r.output : JSON.stringify(r.output);
  return JSON.stringify(r);
}
function unwrapJson(r) {
  const t = unwrapText(r);
  try { return JSON.parse(t); } catch (_) { return null; }
}

// MODE: cowork (window.cowork.callMcpTool present) vs browser (plain HTTP fetch).
const HAS_COWORK = !!(window.cowork && window.cowork.callMcpTool);

async function bashCat(path) {
  if (HAS_COWORK) {
    const cmd = `cat /sessions/*/mnt/QA*Hourly*Analysis/${path} 2>/dev/null || cat "/sessions/$(ls /sessions | head -1)/mnt/QA Hourly Analysis/${path}" 2>/dev/null || cat "${path}"`;
    const result = await window.cowork.callMcpTool(BASH_TOOL, { command: cmd });
    return unwrapText(result);
  }
  // Browser mode: HTTP fetch the file from the local server.
  try {
    const r = await fetch(path);
    if (!r.ok) return "";
    return await r.text();
  } catch { return ""; }
}
async function readJson(path) {
  const t = await bashCat(path);
  if (!t || !t.trim().startsWith("{")) return null;
  try { return JSON.parse(t); } catch (e) {
    console.error(`Could not parse ${path}:`, e);
    return null;
  }
}
// Mirror of deploy/index.html's loadCompletions — loads today's (or any
// EAT date's) ownership_completions rows and buckets them by agent + EAT
// hour. See deploy/index.html for the full rationale.
async function loadCompletions(dateStr) {
  STATE.completionsDate = dateStr;
  STATE.completions = null;
  if (!dateStr) return;
  const start = new Date(`${dateStr}T00:00:00+03:00`);
  const end   = new Date(start);
  end.setUTCDate(end.getUTCDate() + 1);

  // Reads from BOTH ownership_completions AND ownership_qa_sampling per
  // the Flow v2 spec. Dedupe by airtable_record_id keeping earliest
  // timestamp. Mirror of deploy/index.html — see that file for rationale.
  const fetchAll = async (table, agentCol, tsCol) => {
    const out = [];
    for (let page = 0; page < 50; page++) {
      const { data, error } = await sb.from(table)
        .select(`airtable_record_id,${agentCol},${tsCol}`)
        .gte(tsCol, start.toISOString())
        .lt(tsCol,  end.toISOString())
        .order(tsCol, { ascending: true })
        .range(page * 1000, page * 1000 + 999);
      if (error) { console.error(`loadCompletions(${table}):`, error); return null; }
      if (!data || !data.length) break;
      out.push(...data.map(r => ({
        record_id: r.airtable_record_id, agent: r[agentCol], ts: r[tsCol],
      })));
      if (data.length < 1000) break;
    }
    return out;
  };
  try {
    const [comp, samp] = await Promise.all([
      fetchAll("ownership_completions",  "completed_by", "completed_at"),
      fetchAll("ownership_qa_sampling",  "qa_assignee",  "sampled_at"),
    ]);
    if (comp === null || samp === null) return;
    const merged = {};
    for (const r of [...comp, ...samp]) {
      const existing = merged[r.record_id];
      if (!existing || new Date(r.ts) < new Date(existing.ts)) {
        merged[r.record_id] = r;
      }
    }
    const out = {};
    for (const r of Object.values(merged)) {
      const canon = canonicalAgent(r.agent);
      if (!canon) continue;
      const eatHour = (new Date(r.ts).getUTCHours() + 3) % 24;
      out[canon] = out[canon] || {};
      out[canon][eatHour] = (out[canon][eatHour] || 0) + 1;
    }
    STATE.completions = out;
  } catch (e) { console.error("loadCompletions:", e); }
}

// Load the full ownership_task_history ledger (PR #70 + #71). Paginated via
// .range() — a single .limit() would silently cap at 1,000 rows. Cached on
// STATE so re-renders and drawer opens don't refetch.
async function loadTaskHistory() {
  if (STATE.taskHistory) return STATE.taskHistory;
  const all = [];
  for (let page = 0; page < 50; page++) {
    const { data, error } = await sb.from("ownership_task_history")
      .select("*")
      .order("snapshot_date", { ascending: true })
      .range(page * 1000, page * 1000 + 999);
    if (error) { console.error("loadTaskHistory:", error); return null; }
    if (!data || !data.length) break;
    all.push(...data);
    if (data.length < 1000) break;
  }
  STATE.taskHistory = all;
  return all;
}

// Group flat ownership_task_history rows into one summary per task.
function groupTaskHistory(rows) {
  const byName = {};
  for (const r of rows) {
    (byName[r.task_name] = byName[r.task_name] || []).push(r);
  }
  const tasks = [];
  for (const [name, hist] of Object.entries(byName)) {
    hist.sort((a, b) => (a.snapshot_date < b.snapshot_date ? -1 : 1));
    const latest = hist[hist.length - 1];
    const trueTotal = Math.max(...hist.map(h => h.total_records || 0));
    // "Assigned" = the first day the task had records in 'waiting'. A waiting
    // record is assigned to an agent (assigned, not yet started), so the
    // earliest snapshot with waiting > 0 is when the task was assigned.
    let assignedDate = null;
    for (const h of hist) {
      if (((h.status_distribution || {}).waiting || 0) > 0) { assignedDate = h.snapshot_date; break; }
    }
    tasks.push({
      name,
      history: hist,                       // chronological — the day-by-day trace
      latest,                              // most recent row — current/final state
      trueTotal,                           // MAX records ever seen = real size
      isCompleted: !!latest.is_completed,
      firstSeen: hist[0].snapshot_date,
      lastRecorded: latest.snapshot_date,
      assignedDate,
    });
  }
  return tasks;
}

function canonicalAgent(name) {
  if (!name) return null;
  const lc = name.trim().toLowerCase();
  const roster = STATE.roster || {};
  for (const team in roster) {
    for (const m of (roster[team].members || [])) {
      if (m.name && m.name.toLowerCase() === lc) return m.name;
      for (const a of (m.aliases || [])) {
        if (a.toLowerCase() === lc) return m.name;
      }
    }
  }
  return name;
}

async function listFiles(pattern) {
  if (HAS_COWORK) {
    const cmd = `ls /sessions/*/mnt/QA*Hourly*Analysis/${pattern} 2>/dev/null || ls "/sessions/$(ls /sessions | head -1)/mnt/QA Hourly Analysis/${pattern}" 2>/dev/null || ls ${pattern} 2>/dev/null`;
    const result = await window.cowork.callMcpTool(BASH_TOOL, { command: cmd });
    return unwrapText(result).split("\n").filter(Boolean);
  }
  // Browser mode: probe sequential page files (we only use this for recent_p*.json).
  const found = [];
  for (let i = 1; i <= 30; i++) {
    const p = pattern.replace("*", String(i));
    try {
      const r = await fetch(p, { method: "HEAD" });
      if (r.ok) found.push(p);
      else if (r.status === 404 && i > 1) break;  // page run ended
    } catch { break; }
  }
  return found;
}

async function loadAll() {
  STATE.audit  = await readJson("ww_audit_log.json");
  STATE.agg    = await readJson("daily_aggregates.json");
  STATE.roster = (await readJson("config/roster.json"))?.teams || STATE.audit?.roster || {};
  STATE.v2     = STATE.agg?.aggregates_v2 || null;
  STATE.legacy = STATE.agg ? { by_agent: STATE.agg.by_agent || {}, by_team: STATE.agg.by_team || {}, totals: STATE.agg.totals || {}, date: STATE.agg.date } : null;

  if (!STATE.v2) {
    document.getElementById("pageContainer").innerHTML = `<div class="page"><div class="empty-state"><div class="title">No data loaded</div>Could not read <code>daily_aggregates.json</code> or its <code>aggregates_v2</code> block. ${HAS_COWORK ? "Check the bash-cat path." : "Make sure this dashboard is being served from the project root over HTTP (try <code>python3 -m http.server</code>)."}</div></div>`;
    return false;
  }

  // Hourly completions for the aggregator's date (same source as deploy/index.html).
  await loadCompletions(STATE.v2?.date || null);

  // Load cache sample (for 7-day intake trend on Daily Intake page).
  // Union of recent_p* (ownership work) and intake_p* (today's table intake), deduped by id.
  STATE.cacheRecords = [];
  const seenIds = new Set();
  for (const pattern of [".poll_work/recent_p*.json", ".poll_work/intake_p*.json"]) {
    const files = await listFiles(pattern);
    for (const path of files) {
      const cleanPath = path.replace(/^.*\/QA Hourly Analysis\//, "").replace(/^.*\/QA\*Hourly\*Analysis\//, "");
      const data = await readJson(cleanPath);
      if (!data?.records) continue;
      for (const r of data.records) {
        if (r.id && !seenIds.has(r.id)) {
          seenIds.add(r.id);
          STATE.cacheRecords.push(r);
        }
      }
    }
  }

  // Freshness pill — prefer aggregates_v2.computed_at (precise timestamp),
  // fall back to aggregates_v2.date (date only), then to the stale legacy block.
  const ts = STATE.v2?.computed_at || STATE.v2?.date || STATE.legacy?.date || "unknown";
  STATE.freshness = { label: tsLabel(ts), level: tsLevel(ts) };

  return true;
}

// ============================================================================
//  Helpers
// ============================================================================
function eatDate(s) {
  if (!s) return null;
  try { return new Date(s).toLocaleDateString("en-CA", { timeZone: "Africa/Nairobi" }); }
  catch { return null; }
}
function eatHour(s) {
  if (!s) return null;
  try {
    const f = new Intl.DateTimeFormat("en-GB", { timeZone: "Africa/Nairobi", hour: "2-digit", hour12: false }).formatToParts(new Date(s));
    return parseInt(f.find(p => p.type === "hour").value, 10);
  } catch { return null; }
}
function todayEat() {
  return new Date().toLocaleDateString("en-CA", { timeZone: "Africa/Nairobi" });
}
// Yesterday in EAT (YYYY-MM-DD). BO QA reviews the prior day's tagged work, so the
// console's worklist/stratification are scoped to this, not today.
function eatYesterday() {
  const d = new Date(todayEat() + "T00:00:00+03:00");
  d.setDate(d.getDate() - 1);
  return d.toLocaleDateString("en-CA", { timeZone: "Africa/Nairobi" });
}
function fmtEatDateTime(s) {
  if (!s) return "";
  try { return new Date(s).toLocaleString("en-GB", { timeZone: "Africa/Nairobi", hour12: false }); }
  catch { return s; }
}
function tsLabel(ts) {
  if (!ts || ts === "unknown") return "cache freshness unknown";
  const dt = new Date(ts);
  if (isNaN(dt.getTime())) return ts;
  const ageH = (Date.now() - dt.getTime()) / 36e5;
  return `cache from ${fmtEatDateTime(ts)} (${ageH < 1 ? "<1h" : ageH < 24 ? `${Math.round(ageH)}h` : `${Math.round(ageH / 24)}d`} ago)`;
}
function tsLevel(ts) {
  if (!ts) return "alert";
  const ageH = (Date.now() - new Date(ts).getTime()) / 36e5;
  if (ageH < 1) return "fresh";
  if (ageH < 6) return "stale";
  return "alert";
}
function esc(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[c])); }
function pct(num, den) { return den ? (num / den) * 100 : 0; }
function destroyChart(id) { if (STATE.charts[id]) { STATE.charts[id].destroy(); delete STATE.charts[id]; } }

// Get the canonical agent name from a possibly-cased Airtable name
function canonicalAgent(name) {
  if (!name || !STATE.roster) return name;
  const k = String(name).trim().toLowerCase();
  for (const team in STATE.roster) {
    for (const m of (STATE.roster[team].members || [])) {
      if (m.name.toLowerCase() === k) return m.name;
      for (const a of (m.aliases || [])) if (a.toLowerCase() === k) return m.name;
    }
  }
  return name;
}
function teamForAgent(name) {
  if (!name || !STATE.roster) return null;
  const k = String(name).trim().toLowerCase();
  for (const team in STATE.roster) {
    for (const m of (STATE.roster[team].members || [])) {
      if (m.name.toLowerCase() === k) return team;
      for (const a of (m.aliases || [])) if (a.toLowerCase() === k) return team;
    }
  }
  return null;
}

// ============================================================================
//  Navigation
// ============================================================================
function renderNav() {
  const ul = document.getElementById("navList");
  let lastGroup = null;
  ul.innerHTML = PAGES.map(p => {
    const tagHtml = p.tag === "stub" ? `<span class="tag stub">stub</span>`
                  : p.tag === "live" ? `<span class="tag live">live</span>` : "";
    const header = (p.group && p.group !== lastGroup) ? `<li class="nav-section">${p.group}</li>` : "";
    lastGroup = p.group;
    return `${header}<li><button data-page="${p.id}" class="${STATE.currentPage === p.id ? "active" : ""}">${p.label}${tagHtml}</button></li>`;
  }).join("");
  ul.querySelectorAll("button[data-page]").forEach(b => b.addEventListener("click", () => goto(b.dataset.page)));
}

function goto(pageId) {
  STATE.currentPage = pageId;
  localStorage.setItem("wqa.page", pageId);
  renderNav();
  for (const p of PAGES) document.getElementById(`page-${p.id}`).style.display = (p.id === pageId) ? "block" : "none";
  document.getElementById("pageTitle").textContent = PAGES.find(p => p.id === pageId)?.label || "";
  // Re-render the active page each time so charts can be destroyed cleanly.
  for (const id in STATE.charts) destroyChart(id);
  const renderer = PAGE_RENDERERS[pageId];
  if (renderer) renderer();
}

function renderFreshness() {
  const el = document.getElementById("freshness");
  const txt = document.getElementById("freshnessText");
  el.className = "pill " + (STATE.freshness?.level === "fresh" ? "" : STATE.freshness?.level || "");
  txt.textContent = STATE.freshness?.label || "no cache";
}

// Flow Framework v2 alerts — mirror of deploy/index.html. See that file
// for the full rationale.
function renderFlowAlerts(t) {
  const root = document.getElementById("flow-alerts");
  if (!root) return;
  const rows = [
    { type: "missing_qa_assignee", label: "Missing QA assignee",
      hint: "Records in Selected for BO QA without a reviewer (or Done/Valid with qa_status but no assignee)",
      count: t?.alerts_missing_qa_assignee || 0 },
    { type: "missing_qa_status", label: "Missing approve/change decision",
      hint: "Done/Valid records with qa_assignee but no qa_status recorded",
      count: t?.alerts_missing_qa_status || 0 },
    { type: "stuck_in_sampling", label: "Stuck in QA sampling > 24h",
      hint: "Records sampled into BO QA but not yet completed after the 24h threshold",
      count: t?.alerts_stuck_in_sampling || 0 },
  ];
  const visible = rows.filter(r => r.count > 0);
  if (!visible.length) {
    root.innerHTML = `<div class="alert-row"><span class="icon" style="background:rgba(31,111,44,0.12);color:#1f6f2c">✓</span><div>No open data-integrity alerts.</div></div>`;
    return;
  }
  root.innerHTML = visible.map(r => `
    <div class="alert-row ${r.type === 'stuck_in_sampling' ? 'bad' : 'warn'}">
      <span class="icon">!</span>
      <div style="flex:1">
        <strong>${esc(r.label)}: ${r.count}</strong>
        <div class="small-mono" style="color:var(--muted)">${esc(r.hint)}</div>
      </div>
      <button class="small-mono" data-alert-type="${r.type}"
              style="padding:4px 10px; cursor:pointer; border:1px solid var(--border); background:var(--surface); border-radius:3px;">View</button>
    </div>
    <div id="flow-alert-detail-${r.type}" style="display:none; margin: -2px 0 8px 32px; padding: 8px; background: var(--soft); border-radius: 4px;"></div>
  `).join("");
  for (const r of visible) {
    const btn = root.querySelector(`button[data-alert-type="${r.type}"]`);
    const det = document.getElementById(`flow-alert-detail-${r.type}`);
    btn.addEventListener("click", async () => {
      if (det.style.display === "block") {
        det.style.display = "none"; btn.textContent = "View"; return;
      }
      det.style.display = "block"; btn.textContent = "Hide";
      if (det.dataset.loaded !== "true") {
        det.innerHTML = `<div class="small-mono" style="color:var(--muted)">Loading…</div>`;
        try {
          const all = [];
          for (let page = 0; page < 50; page++) {
            const { data, error } = await sb.from("flow_alerts")
              .select("airtable_record_id,verification_status,qa_assignee,qa_status,first_seen_at")
              .eq("alert_type", r.type)
              .is("resolved_at", null)
              .order("first_seen_at", { ascending: false })
              .range(page * 1000, page * 1000 + 999);
            if (error) throw error;
            if (!data || !data.length) break;
            all.push(...data);
            if (data.length < 1000) break;
          }
          if (!all.length) {
            det.innerHTML = `<div class="empty">No records found (alert may have just resolved).</div>`;
          } else {
            det.innerHTML = `
              <table style="width:100%;font-size:12px">
                <thead><tr><th style="text-align:left">Airtable record</th><th style="text-align:left">verification_status</th><th style="text-align:left">qa_assignee</th><th style="text-align:left">qa_status</th><th style="text-align:left">First seen</th></tr></thead>
                <tbody>${all.slice(0, 100).map(row => `<tr><td class="small-mono">${esc(row.airtable_record_id)}</td><td>${esc(row.verification_status || "")}</td><td>${esc(row.qa_assignee || "")}</td><td>${esc(row.qa_status || "")}</td><td class="small-mono">${esc(row.first_seen_at?.slice(0, 16).replace("T", " ") || "")}</td></tr>`).join("")}</tbody>
              </table>
              ${all.length > 100 ? `<div class="small-mono" style="color:var(--muted);margin-top:6px">Showing 100 of ${all.length}.</div>` : ""}`;
          }
          det.dataset.loaded = "true";
        } catch (e) {
          det.innerHTML = `<div class="alert-row bad"><span class="icon">!</span><div>Failed to load: ${esc(String(e))}</div></div>`;
        }
      }
    });
  }
}

function computeTeamAlerts() {
  // Two rules per the design: tagged_today == 0, OR drop > 50% from 7-day avg.
  // 7-day avg requires history — for now we can only fire the "zero" rule.
  const alerts = [];
  for (const team of Object.keys(STATE.roster || {}).sort()) {
    const m = STATE.v2?.by_team?.[team];
    if (!m) {
      alerts.push({ team, level: "warn", icon: "○", message: "no records in this cache window — team may be inactive today" });
      continue;
    }
    if (m.tagged_today === 0) {
      alerts.push({ team, level: "warn", icon: "○", message: "no new tags today" });
    }
  }
  return alerts;
}

function renderAgentBody(agentName) {
  const m = STATE.v2?.by_agent?.[agentName];

  if (!m) {
    body.innerHTML = noDataHtml(`No cache records for ${esc(agentName)} in past 24h window`);

  document.getElementById("agentMeta").textContent = `${team || "—"} team`;
  const min280 = STATE.audit?.config?.thresholds?.daily_productivity_minimum || 280;
  const tagged = m.tagged_today || 0;
  const prodClass = tagged >= min280 ? "good" : "bad";
  const rejectClass = m.reject_rate > m.reject_threshold ? "bad" : "good";
  const nsT = m.sampling_target_non_sanctions_pct;
  const sCT = m.sampling_target_sanctions_pct;

const EXPERT_DISPLAY = ["Irene Njuguna", "Simon Francis"];
// Monday (ISO week start, YYYY-MM-DD) of the week containing the given date. Uses
// noon-UTC so it's pure calendar-date math, immune to TZ/DST day-boundary shifts.
function _mondayOf(iso) {
  const d = new Date(iso + "T12:00:00Z");
  const dow = (d.getUTCDay() + 6) % 7;          // 0=Mon … 6=Sun
  d.setUTCDate(d.getUTCDate() - dow);
  return d.toISOString().slice(0, 10);
}
// "19–25 May" (same month) or "28 Apr–4 May" (spanning) for a Monday-start week.
function _weekLabel(mondayIso) {
  const mon = new Date(mondayIso + "T12:00:00Z");
  const sun = new Date(mon); sun.setUTCDate(sun.getUTCDate() + 6);
  const day = (d) => d.getUTCDate();
  const mo3 = (d) => d.toLocaleDateString("en-GB", { timeZone: "UTC", month: "short" });
  return mo3(mon) === mo3(sun)
    ? `${day(mon)}–${day(sun)} ${mo3(sun)}`
    : `${day(mon)} ${mo3(mon)}–${day(sun)} ${mo3(sun)}`;
}

// "Weekly output" — multi-week record counts per expert. The live cache only holds
// ~7 days, so history comes from accumulated daily snapshots: step back 7 days at a
// time from the viewed date and take each snapshot's per-expert `daily` 7-day window
// (5 windows tile ~35 days with no gaps). Keyed by date so overlapping windows
// dedupe. expert_activity is new (PR #57), so older snapshots roll up to nothing —
// guarded with a tidy empty state. Async, mirroring the Case Scenarios heatmap.
async function renderExpertsWeekly() {
  const root = document.getElementById("expertsWeekly");
  if (!root) return;
  const anchor = STATE.v2?.date || todayEat();
  const stepDates = [0, 7, 14, 21, 28].map(off => {
    const d = new Date(anchor + "T00:00:00+03:00");
    d.setDate(d.getDate() - off);
    return d.toLocaleDateString("en-CA", { timeZone: "Africa/Nairobi" });
  });
  // Anchor uses STATE.v2 directly; the rest read snapshots with ±1/±2 day fallback.
  const fetchSnap = async (iso, isAnchor) => {
    if (isAnchor) return STATE.v2 || null;
    for (const delta of [0, -1, 1, -2, 2]) {
      const d = new Date(iso + "T00:00:00+03:00");
      d.setDate(d.getDate() + delta);
      const ds = d.toLocaleDateString("en-CA", { timeZone: "Africa/Nairobi" });
      const snap = await readJson(`.poll_work/snapshots/${ds}.json`);
      if (snap) return snap;
    }
    return null;
  };
  const snaps = await Promise.all(stepDates.map((iso, i) => fetchSnap(iso, i === 0)));

  // date -> { expertName: records }  (keyed by date so overlapping windows dedupe)
  const dayMap = {};
  for (const snap of snaps) {
    const ea = snap?.expert_activity;
    if (!ea || !Array.isArray(ea.experts)) continue;  // predates PR #57
    for (const e of ea.experts) {
      if (!EXPERT_DISPLAY.includes(e.name)) continue;
      for (const d of (e.daily || [])) {
        if (!d || !d.date) continue;
        (dayMap[d.date] = dayMap[d.date] || {})[e.name] = d.records || 0;
      }
    }
  }

  const dates = Object.keys(dayMap);
  if (dates.length === 0) {
    root.innerHTML = `<div class="empty">Weekly history is still accumulating. Expert tracking is new, so snapshots recorded before it carry no per-day data to roll up — this fills in as daily snapshots build up.</div>`;
    return;
  }

  // Bucket into ISO weeks (Mon–Sun); sum each expert's records per week.
  const weeks = {};  // mondayIso -> { "Irene Njuguna", "Simon Francis" }
  for (const date of dates) {
    const wk = _mondayOf(date);
    const w = (weeks[wk] = weeks[wk] || { "Irene Njuguna": 0, "Simon Francis": 0 });
    for (const name of EXPERT_DISPLAY) w[name] += (dayMap[date][name] || 0);
  }
  const currentWeek = _mondayOf(anchor);
  const weekKeys = Object.keys(weeks).sort();           // ascending (oldest first)

  // Coverage: how many of each week's 7 calendar days actually have data. The ~35-day
  // window starts mid-week, so the oldest week (and any week straddling a snapshot gap)
  // is only partially covered. A week counts toward the average ONLY if it's fully
  // covered (7/7 days) and not the current in-progress week — otherwise a partial week
  // is averaged in at full weight and drags the mean down.
  const daysCovered = {};
  for (const wk of weekKeys) {
    const mon = new Date(wk + "T12:00:00Z");
    let n = 0;
    for (let i = 0; i < 7; i++) {
      const d = new Date(mon); d.setUTCDate(d.getUTCDate() + i);
      if (dayMap[d.toISOString().slice(0, 10)]) n++;
    }
    daysCovered[wk] = n;
  }
  const isFull = (k) => daysCovered[k] === 7 && k !== currentWeek;
  const fullWeeks = weekKeys.filter(isFull);

  // Weekly average across full 7-day weeks only.
  const avg = { "Irene Njuguna": 0, "Simon Francis": 0, total: 0 };
  if (fullWeeks.length) {
    for (const k of fullWeeks) {
      avg["Irene Njuguna"] += weeks[k]["Irene Njuguna"];
      avg["Simon Francis"] += weeks[k]["Simon Francis"];
    }
    avg["Irene Njuguna"] = Math.round(avg["Irene Njuguna"] / fullWeeks.length);
    avg["Simon Francis"] = Math.round(avg["Simon Francis"] / fullWeeks.length);
    avg.total = avg["Irene Njuguna"] + avg["Simon Francis"];
  }

  const body = [...weekKeys].reverse().map(k => {       // most recent week first
    const irene = weeks[k]["Irene Njuguna"], simon = weeks[k]["Simon Francis"];
    let tag = "";
    if (k === currentWeek) tag = ' <span class="pill-inline warn">in progress</span>';
    else if (daysCovered[k] < 7) tag = ` <span class="pill-inline warn">partial · ${daysCovered[k]}/7 days</span>`;
    return `<tr>
      <td>${esc(_weekLabel(k))}${tag}</td>
      <td class="right">${irene}</td>
      <td class="right">${simon}</td>
      <td class="right"><strong>${irene + simon}</strong></td>
    </tr>`;
  }).join("");
  const avgRow = fullWeeks.length
    ? `<tr style="border-top:2px solid var(--border)"><td><strong>Weekly average</strong> <span class="small-mono">completed weeks (${fullWeeks.length})</span></td><td class="right"><strong>${avg["Irene Njuguna"]}</strong></td><td class="right"><strong>${avg["Simon Francis"]}</strong></td><td class="right"><strong>${avg.total}</strong></td></tr>`
    : `<tr><td colspan="4" class="small-mono">No completed weeks yet — the average appears once a full 7-day week is in.</td></tr>`;

  root.innerHTML = `
    <div class="chart-wrap small" style="margin-bottom:10px"><canvas id="expertsWeeklyChart"></canvas></div>
    <table>
      <thead><tr><th>Week</th><th class="right">Irene</th><th class="right">Simon</th><th class="right">Total</th></tr></thead>
      <tbody>${body}${avgRow}</tbody>
    </table>`;

  const ctx = document.getElementById("expertsWeeklyChart");
  if (ctx) {
    destroyChart("expertsWeeklyChart");
    STATE.charts["expertsWeeklyChart"] = new Chart(ctx, {
      type: "bar",
      data: {
        labels: weekKeys.map(_weekLabel),
        datasets: [{
          label: "Records",
          data: weekKeys.map(k => weeks[k]["Irene Njuguna"] + weeks[k]["Simon Francis"]),
          backgroundColor: weekKeys.map(k => isFull(k) ? "#3d63dd" : "#9aa7bd"),  // grey = not a full week (in progress or partial)
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { afterLabel: c => {
          const k = weekKeys[c.dataIndex];
          if (k === currentWeek) return "in progress";
          if (daysCovered[k] < 7) return "partial — " + daysCovered[k] + "/7 days";
          return "";
        } } } },
        scales: { y: { beginAtZero: true, ticks: { precision: 0 } } },
      },
    });
  }
}

// -------- 7-Day Comparison --------
// 7-day rolling comparison across teams and agents in one view. Count metrics
// (tagged, properly_completed, qa_inspected, qa_changed) are SUMMED over the
// window; rate metrics are RECOMPUTED from the summed components — never the
// average of daily percentages. The viewed date uses STATE.v2; the 6 prior
// days come from snapshots/<date>.json (same window approach as renderBoqa7Day).
const COMPARISON_STATE = { sortBy: "tagged", sortDir: "desc", team: "all", data: null };

PAGE_RENDERERS.comparison = function () {
  const root = document.getElementById("page-comparison");
  if (!STATE.v2?.by_team && !STATE.v2?.by_agent) {
    root.innerHTML = noDataHtml("by_team / by_agent not in aggregates_v2 — run aggregate_v2.py");

async function loadComparison7Day() {
  const anchor = STATE.v2?.date || todayEat();
  const dates = [];
  for (let i = 6; i >= 0; i--) {
    const dt = new Date(anchor + "T00:00:00+03:00");
    dt.setDate(dt.getDate() - i);
    dates.push(dt.toLocaleDateString("en-CA", { timeZone: "Africa/Nairobi" }));
  }
  const snaps = await Promise.all(dates.map(async d => {
    if (d === anchor) return { d, agg: STATE.v2 || null };
    return { d, agg: await readJson(`.poll_work/snapshots/${d}.json`) };  // null if missing
  }));
  const present = snaps.filter(s => s.agg);

  // Sum the raw components per team and per agent across the window.
  const acc = (store, key, m) => {
    const a = (store[key] = store[key] || { tagged: 0, completed: 0, reviews: 0, changes: 0, sampled: 0 });
    const tagged = m.tagged_today || 0;
    a.tagged    += tagged;
    a.completed += m.properly_completed_today || 0;
    a.reviews   += m.qa_inspected_today || 0;
    a.changes   += m.qa_changed_today || 0;
    // The sampled count isn't stored — back it out from the day's sampling % × tagged.
    a.sampled   += (m.sampling_actual_pct || 0) / 100 * tagged;
  };
  const teamStore = {}, agentStore = {};
  for (const s of present) {
    for (const [team, m] of Object.entries(s.agg.by_team || {})) acc(teamStore, team, m);
    for (const [agent, m] of Object.entries(s.agg.by_agent || {})) acc(agentStore, agent, m);
  }

  // Recompute rates from the summed components — never average daily %s.
  const finalize = (name, a, withTeam) => {
    const row = {
      name, tagged: a.tagged, completed: a.completed, reviews: a.reviews, changes: a.changes,
      completionPct: a.tagged > 0 ? a.completed / a.tagged * 100 : null,
      rejectPct:     a.reviews > 0 ? a.changes / a.reviews * 100 : null,
      samplingPct:   a.tagged > 0 ? a.sampled / a.tagged * 100 : null,
    };
    if (withTeam) row.team = teamForAgent(name) || "—";
    return row;
  };
  COMPARISON_STATE.data = {
    days: present.length,
    threshold: (typeof STATE.v2?.reject_threshold === "number") ? STATE.v2.reject_threshold : 30,
    teams:  Object.entries(teamStore).map(([k, a]) => finalize(k, a, false)),
    agents: Object.entries(agentStore).map(([k, a]) => finalize(k, a, true)),
  };
  renderComparisonTeams();
  renderComparisonAgents();
}

// Rate cell — green/red against the reject threshold only for Reject %; other
// rates render plain. Null (no denominator in the window) renders as a dash.
function cmpRateCell(pct, threshold, colourReject) {
  if (pct == null) return '<span class="small-mono">—</span>';
  if (!colourReject) return `${pct.toFixed(1)}%`;
  return `<span class="pill-inline ${pct >= threshold ? "bad" : "good"}">${pct.toFixed(1)}%</span>`;
}

function renderHourlyGrid(filterTeam) {
  const hours = Array.from({ length: 18 }, (_, i) => i + 6);  // 6..23
  const teams = Object.keys(STATE.roster || {}).sort();
  const visibleTeams = (filterTeam && filterTeam !== "__all__") ? [filterTeam] : teams;

  // First pass: gather rows so we can compute the global max for intensity scaling.
  const rows = [];
  let gridMax = 0;
  for (const team of visibleTeams) {
    const members = (STATE.roster[team]?.members || []).slice().sort((a, b) => a.name.localeCompare(b.name));
    for (const m of members) {
      const buckets = STATE.completions?.[m.name] || {};
      const counts = hours.map(h => buckets[h] ?? buckets[String(h)] ?? 0);
      // Total covers ALL 24 hours (incl. overnight cron ticks ~00:30 / 03:30
      // EAT), not just the visible 6–23 columns. `outside` = rows whose EAT
      // hour falls outside that window — flagged with a * on the Total.
      const total = Object.values(buckets).reduce((a, b) => a + b, 0);
      const outside = total - counts.reduce((a, b) => a + b, 0);
      gridMax = Math.max(gridMax, ...counts);
      rows.push({ kind: "agent", team, name: m.name, counts, total, outside });
    }
    rows.push({ kind: "divider", team });
  }

  // Sum-across-all-visible-agents row (per visible hour 6–23 for the cells)
  const agentRows = rows.filter(r => r.kind === "agent");
  const colSums = hours.map((_, i) => agentRows.reduce((s, r) => s + r.counts[i], 0));
  // Grand total covers all 24h (sum of the per-agent 24h totals), not just visible cells.
  const grand = agentRows.reduce((s, r) => s + r.total, 0);
  const grandOutside = agentRows.reduce((s, r) => s + r.outside, 0);

  const cellHtml = (v, h, scale) => {
    if (v === 0) return `<div class="cell z" title="${h}:00 EAT">0</div>`;
    const alpha = scale === 0 ? 0 : (0.2 + 0.8 * (v / scale)).toFixed(2);
    return `<div class="cell" style="background:rgba(20,80,179,${alpha});" title="${h}:00 EAT → ${v}">${v}</div>`;
  };
  const headers = hours.map(h => `<div class="header">${h}</div>`).join("");

  // Group rows visually: emit a team divider row before each team's members.
  let html = "";
  let lastTeam = null;
  let teamStarted = false;
  for (const r of rows) {
    if (r.kind === "divider") continue;
    if (r.team !== lastTeam) {
      if (teamStarted) html += `<div class="hourly-spacer"></div>`;
      html += `<div class="hourly-team-label">${esc(r.team)}</div>` + `<div class="hourly-team-fill" style="grid-column: 2 / span ${hours.length + 1};"></div>`;
      lastTeam = r.team;
      teamStarted = true;
    }
    html += `<div class="label">${esc(r.name)}</div>`;
    html += r.counts.map((v, i) => cellHtml(v, hours[i], gridMax)).join("");
    const outTip = r.outside > 0 ? ` title="includes ${r.outside} record${r.outside === 1 ? "" : "s"} tagged outside 06:00–23:00 EAT"` : "";
    html += `<div class="cell" style="background:#f0eee8;color:#1a1a1a;font-weight:600;"${outTip}>${r.total}${r.outside > 0 ? "*" : ""}</div>`;
  }
  // Footer "All agents" sum row
  html += `<div class="hourly-spacer"></div>`;
  html += `<div class="label" style="font-weight:600;">All agents</div>`;
  html += colSums.map((v, i) => {
    if (v === 0) return `<div class="cell z" title="${hours[i]}:00 EAT total">0</div>`;
    const colMax = Math.max(1, ...colSums);
    const alpha = (0.2 + 0.8 * (v / colMax)).toFixed(2);
    return `<div class="cell" style="background:rgba(31,111,44,${alpha});" title="${hours[i]}:00 EAT total → ${v}">${v}</div>`;
  }).join("");
  const grandTip = grandOutside > 0 ? ` title="includes ${grandOutside} record${grandOutside === 1 ? "" : "s"} tagged outside 06:00–23:00 EAT"` : "";
  html += `<div class="cell" style="background:#1a1a1a;color:#fff;font-weight:600;"${grandTip}>${grand}${grandOutside > 0 ? "*" : ""}</div>`;

  document.getElementById("hourlyGrid").innerHTML = `
    <div class="hourly-heatmap" style="grid-template-columns: 180px repeat(${hours.length}, 1fr) 70px;">
      <div class="header"></div>${headers}<div class="header">Total</div>
      ${html}
    </div>`;
  fitTableHeight(document.getElementById("hourlyGrid"));
}

// 7-day QA window: sum qa_inspected_today / qa_changed_today (reviews are bucketed
// by review date — PR #54 — so summing review-day counts across the window is the
// right rolling lens) across the viewed date + 6 prior days. The viewed date's data
// is STATE.v2; the 6 prior come from snapshots/<date>.json (same approach as the
// Case Scenarios 7-day heatmap). Fills the team scoreboard, agent leaderboard and
// reject-rate heatmap. Fully snapshot-based — works in browser mode, no Cowork.
// ---- Stale assigned-task detection (PR #67) ----
// "Stale" = an assigned task whose waiting-record count has NOT decreased since
// the most recent snapshot that is >=24h older than the data on screen. The
// dashboard's own daily snapshots are the trusted clock; there is no reliable
// per-record "assigned at" timestamp in the source data. Going-forward only:
// it can see no further back than snapshot history exists.
async function computeStaleTasks() {
  STATE.staleTaskNames = new Set();
  STATE.staleCompareDate = null;
  const v2 = STATE.v2;
  if (!v2 || !Array.isArray(v2.tasks_all) || !v2.date) return;
  const anchorIso = v2.computed_at || (v2.date + "T23:59:59Z");
  const anchorMs = new Date(anchorIso).getTime();
  if (isNaN(anchorMs)) return;
  const anchorDate = new Date(v2.date.slice(0, 10) + "T00:00:00Z");
  // Walk back day by day; take the first snapshot whose computed_at is at
  // least 24h before the anchor.
  let cmp = null;
  for (let back = 1; back <= 10; back++) {
    const d = new Date(anchorDate.getTime() - back * 86400000);
    const ds = d.toISOString().slice(0, 10);
    const snap = await readJson(`.poll_work/snapshots/${ds}.json`);
    if (!snap) continue;
    const snapMs = new Date(snap.computed_at || (ds + "T23:59:59Z")).getTime();
    if (!isNaN(snapMs) && anchorMs - snapMs >= 24 * 3600 * 1000) {
      cmp = { ds, snap };
      break;
    }
  }
  if (!cmp) return;   // not enough snapshot history yet
  STATE.staleCompareDate = cmp.ds;
  const prevWaiting = {};
  for (const pt of (cmp.snap.tasks_all || [])) {
    prevWaiting[pt.name] = (pt.status_distribution && pt.status_distribution.waiting) || 0;
  }
  for (const t of v2.tasks_all) {
    const nowWaiting = (t.status_distribution && t.status_distribution.waiting) || 0;
    const assigned = Array.isArray(t.agents_worked) && t.agents_worked.length > 0;
    const wasWaiting = prevWaiting[t.name] || 0;
    // Idempotent: strip any prior stale-24h flag before re-deciding (this
    // function re-runs whenever the viewed snapshot changes).
    if (Array.isArray(t.flags)) {
      t.flags = t.flags.filter(f => f !== "stale-24h");
    }
    if (assigned && nowWaiting > 0 && wasWaiting > 0 && nowWaiting >= wasWaiting) {
      STATE.staleTaskNames.add(t.name);
      if (Array.isArray(t.flags)) t.flags.push("stale-24h");
    }
  }
}

async function renderBoqa7Day() {
  const anchor = STATE.v2?.date || todayEat();
  const dates = [];
  for (let i = 6; i >= 0; i--) {
    const dt = new Date(anchor + "T00:00:00+03:00");
    dt.setDate(dt.getDate() - i);
    dates.push(dt.toLocaleDateString("en-CA", { timeZone: "Africa/Nairobi" }));
  }
  const snaps = await Promise.all(dates.map(async d => {
    if (d === anchor) return { d, agg: STATE.v2 || null };
    return { d, agg: await readJson(`.poll_work/snapshots/${d}.json`) };  // null if missing
  }));
  const threshold = (typeof STATE.v2?.reject_threshold === "number") ? STATE.v2.reject_threshold : 30;
  const rejCls = (rate) => rate >= threshold ? "bad" : "good";
  const rate = (chg, rev) => rev > 0 ? (chg / rev * 100) : null;

  // Sum across the window, per team and per agent.
  const teamAgg = {}, agentAgg = {};
  for (const s of snaps) {
    for (const [team, m] of Object.entries(s.agg?.by_team || {})) {
      const a = (teamAgg[team] = teamAgg[team] || { reviews: 0, changes: 0 });
      a.reviews += m.qa_inspected_today || 0; a.changes += m.qa_changed_today || 0;
    }
    for (const [agent, m] of Object.entries(s.agg?.by_agent || {})) {
      const a = (agentAgg[agent] = agentAgg[agent] || { reviews: 0, changes: 0 });
      a.reviews += m.qa_inspected_today || 0; a.changes += m.qa_changed_today || 0;
    }
  }

  // Team scoreboard — best first (lowest reject rate; no-review teams sort last).
  const teamRows = Object.entries(teamAgg)
    .map(([team, a]) => ({ team, ...a, rate: rate(a.changes, a.reviews) }))
    .sort((x, y) => (x.rate == null ? Infinity : x.rate) - (y.rate == null ? Infinity : y.rate));
  const teamScore = document.getElementById("boqaTeamScore");
  if (teamScore) {
    teamScore.innerHTML = teamRows.length === 0
      ? `<div class="empty">No QA reviews in the last 7 days.</div>`
      : `<table><thead><tr><th>Team</th><th class="right">Reviews</th><th class="right">Changes</th><th class="right">Reject rate</th></tr></thead><tbody>${
          teamRows.map(r => `<tr><td>${esc(r.team)}</td><td class="right">${r.reviews}</td><td class="right">${r.changes}</td><td class="right">${r.rate == null ? '<span class="small-mono">—</span>' : `<span class="pill-inline ${rejCls(r.rate)}">${r.rate.toFixed(1)}%</span>`}</td></tr>`).join("")
        }</tbody></table>`;
  }

  // Agent error leaderboard — worst first, only agents with >= 10 reviews over the window.
  const MIN_REVIEWS = 10;
  const agentRows = Object.entries(agentAgg)
    .map(([agent, a]) => ({ agent, ...a, rate: rate(a.changes, a.reviews) }))
    .filter(r => r.reviews >= MIN_REVIEWS)
    .sort((x, y) => (y.rate || 0) - (x.rate || 0));
  const agentLeader = document.getElementById("boqaAgentLeader");
  if (agentLeader) {
    agentLeader.innerHTML = agentRows.length === 0
      ? `<div class="empty">No agents with ≥${MIN_REVIEWS} reviews in the last 7 days.</div>`
      : `<table><thead><tr><th>Agent</th><th>Team</th><th class="right">Reviews</th><th class="right">Changes</th><th class="right">Reject rate</th></tr></thead><tbody>${
          agentRows.map(r => `<tr><td class="agent-name">${esc(r.agent)}</td><td>${esc(teamForAgent(r.agent) || "—")}</td><td class="right">${r.reviews}</td><td class="right">${r.changes}</td><td class="right"><span class="pill-inline ${rejCls(r.rate)}">${r.rate.toFixed(1)}%</span></td></tr>`).join("")
        }</tbody></table>`;
  }

  // 7-day reject-rate heatmap — rows = teams, cols = days; intensity by rate (redder
  // = higher). A day with no snapshot or no reviews renders muted.
  let teams = Object.keys(STATE.roster || {}).sort();
  if (!teams.length) teams = Object.keys(teamAgg).sort();
  const hm = document.getElementById("boqaRejectHeatmap");
  if (hm) {
    if (!teams.length) {
      hm.innerHTML = `<div class="empty">No teams to chart.</div>`;
    } else {
      const shortDay = d => new Date(d + "T00:00:00+03:00").toLocaleDateString("en-GB", { timeZone: "Africa/Nairobi", day: "numeric", month: "short" });
      const headerCells = snaps.map(s => `<div class="header">${esc(shortDay(s.d))}</div>`).join("");
      const rows = teams.map(team => {
        const cells = snaps.map(s => {
          if (!s.agg) return `<div class="cell z" title="${esc(s.d)}: no snapshot"></div>`;
          const m = s.agg.by_team?.[team];
          const rev = m?.qa_inspected_today || 0;
          if (rev === 0) return `<div class="cell z" title="${esc(team)} · ${esc(s.d)}: no reviews"></div>`;
          const chg = m?.qa_changed_today || 0;
          const rt = chg / rev * 100;
          const alpha = (0.2 + 0.8 * Math.min(1, rt / 50)).toFixed(2);
          return `<div class="cell" style="background:rgba(155,34,34,${alpha})" title="${esc(team)} · ${esc(s.d)}: ${chg}/${rev} = ${rt.toFixed(0)}%">${rt.toFixed(0)}%</div>`;
        }).join("");
        return `<div class="label">${esc(team)}</div>${cells}`;
      }).join("");
      hm.innerHTML = `<div class="heatmap" style="grid-template-columns: 120px repeat(7, minmax(40px, 1fr));"><div class="header"></div>${headerCells}${rows}</div>`;
    }
  }
}

// Per-reviewer BO QA load — from the cached snapshot's by_qa block (works in
// browser + Cowork, today + historical). assigned = bo_qa_backlog (records in
// this reviewer's BO QA queue), reviewed = qa_inspected_today. Skips reviewers
// with no assigned and no reviews; coverage capped at 100%.
function renderQaReviewerLoad() {
  const root = document.getElementById("boqaReviewerLoad");
  if (!root) return;
  const byQa = STATE.v2?.by_qa || {};
  const rows = Object.entries(byQa)
    .map(([name, m]) => ({
      name,
      assigned: (typeof m.bo_qa_backlog === "number") ? m.bo_qa_backlog : 0,
      reviewed: (typeof m.qa_inspected_today === "number") ? m.qa_inspected_today : 0,
    }))
    .filter(r => r.assigned > 0 || r.reviewed > 0)
    .sort((a, b) => (b.assigned - a.assigned) || (b.reviewed - a.reviewed));
  if (rows.length === 0) {
    root.innerHTML = `<div class="empty">No QA reviewers have assigned or reviewed records yet.</div>`;
    return;
  }
  const cov = (r) => r.assigned > 0
    ? Math.min(100, Math.round((r.reviewed / r.assigned) * 100))
    : (r.reviewed > 0 ? 100 : 0);
  const body = rows.map(r => `<tr>
      <td>${esc(r.name)}</td>
      <td class="right">${r.assigned.toLocaleString()}</td>
      <td class="right">${r.reviewed.toLocaleString()}</td>
      <td class="right">${cov(r)}%</td>
    </tr>`).join("");
  root.innerHTML = `<table>
    <thead><tr><th>Reviewer</th><th class="right">Assigned (BO QA queue)</th><th class="right">Reviewed today</th><th class="right">Coverage %</th></tr></thead>
    <tbody>${body}</tbody></table>`;
}

    tasksRoot.innerHTML = `
      <table>
        <thead><tr><th>Task name</th><th class="right">Records</th><th class="right">Share</th><th>Type</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${more}`;
  }

  // Per-team table
  const teams = Object.keys(STATE.roster || {}).sort();
  const rows = teams.map(team => {
    const m = STATE.v2?.by_team?.[team];
    if (!m) return `<tr><td><strong>${esc(team)}</strong></td><td colspan="4" class="empty">no cache records</td></tr>`;
    return `<tr>
      <td><strong>${esc(team)}</strong></td>
      <td class="right">${m.team_routed_intake_today}</td>
      <td class="right">${m.tagged_today}</td>
      <td class="right">${(m.counts_by_verification_status?.waiting || 0).toLocaleString()}</td>
      <td class="right">${m.bo_qa_backlog}</td>
    </tr>`;
  }).join("");
  document.getElementById("intakeTable").innerHTML = `
    <thead><tr><th>Team</th><th class="right">Routed today</th><th class="right">Tagged today</th><th class="right">Assigned &amp; waiting</th><th class="right">BO QA backlog</th></tr></thead>
    <tbody>${rows}</tbody>`;

  // Routing health
  const totalIntake = t?.relations_support_intake_today || 0;
  const routed = sumByTeam("team_routed_intake_today");
  const unassigned = Math.max(0, totalIntake - routed);
  document.getElementById("intakeRouting").innerHTML = `
    <table>
      <tr><td>Total intake today</td><td class="right"><strong>${totalIntake.toLocaleString()}</strong></td></tr>
      <tr><td>Routed to 5 ownership teams</td><td class="right">${routed}</td></tr>
      <tr><td>Assigned elsewhere / unassigned</td><td class="right">${unassigned.toLocaleString()}</td></tr>
    </table>
    <div class="footer-note" style="margin-top:8px">Today's intake is being absorbed by upstream taggers, not the 5 ownership teams. Reflect on whether this is expected per SOP.</div>`;

  // 7-day intake chart — fetch totals.relations_support_intake_today from
  // the daily snapshots in Supabase Storage. The old implementation derived
  // this from STATE.cacheRecords, which was capped at the 20-page fetch and
  // never reflected the true whole-table intake — only today's partial cache.
  (async () => {
    const today = todayEat();
    const dates = [];
    for (let i = 6; i >= 0; i--) {
      const dt = new Date(today + "T00:00:00+03:00");
      dt.setDate(dt.getDate() - i);
      dates.push(dt.toLocaleDateString("en-CA", { timeZone: "Africa/Nairobi" }));
    }
    const last7 = await Promise.all(dates.map(async d => {
      const snap = await readJson(`.poll_work/snapshots/${d}.json`);
      const n = snap?.totals?.relations_support_intake_today;
      return { d, n: (typeof n === "number") ? n : null };  // null = no snapshot found
    }));
    const ctx = document.getElementById("chart-7day-intake");
    if (!ctx) return;
    if (STATE.charts["chart-7day-intake"]) STATE.charts["chart-7day-intake"].destroy();
    STATE.charts["chart-7day-intake"] = new Chart(ctx, {
      type: "bar",
      data: {
        labels: last7.map(x => x.d),
        datasets: [{
          label: "Records uploaded (whole table)",
          data: last7.map(x => x.n ?? 0),
          backgroundColor: last7.map(x => x.n == null ? "#cccccc" : "#3d63dd"),
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: c => {
            const v = last7[c.dataIndex].n;
            return v == null ? "no snapshot for this day" : v.toLocaleString() + " records";
          }}},
        },
      },
    });
  })();
};
function sumByTeam(field) {
  let sum = 0;
  for (const team in (STATE.v2?.by_team || {})) sum += (STATE.v2.by_team[team]?.[field] || 0);
  return sum;
}

function _tasksFiltered() {
  const today = STATE.v2?.date;
  let out = STATE.v2?.tasks_all || [];
  if (TASKS_STATE.filter) {
    const f = TASKS_STATE.filter.toLowerCase();
    out = out.filter(t => t.name.toLowerCase().includes(f));
  }
  if (TASKS_STATE.view === "today") {
    out = out.filter(t => (t.date_first_seen || "").slice(0, 10) === today);
  } else if (TASKS_STATE.view === "incomplete") {
    out = out.filter(t => t.flags.includes("incomplete"));
  } else if (TASKS_STATE.view === "stuck") {
    out = out.filter(t => t.flags.includes("stuck"));
  } else if (TASKS_STATE.view === "stale") {
    out = out.filter(t => (t.flags || []).includes("stale-24h"));
  } else if (TASKS_STATE.view === "completed") {
    out = out.filter(t => t.is_completed);
  } else if (TASKS_STATE.view === "aging") {
    out = out.filter(t => (t.flags || []).includes("aging"));
  } else if (TASKS_STATE.view === "flagged") {
    out = out.filter(t => t.flags.length > 0);
  }
  // Sort
  const k = TASKS_STATE.sortBy, dir = TASKS_STATE.sortDir === "asc" ? 1 : -1;
  out = [...out].sort((a, b) => {
    let av, bv;
    if (k === "name") { av = a.name; bv = b.name; }
    else if (k === "total") { av = a.total_records_in_cache; bv = b.total_records_in_cache; }
    else if (k === "Valid")   { av = a.status_distribution.Valid;   bv = b.status_distribution.Valid; }
    else if (k === "BO QA")   { av = a.status_distribution["Selected for BO QA "]; bv = b.status_distribution["Selected for BO QA "]; }
    else if (k === "waiting") { av = a.status_distribution.waiting; bv = b.status_distribution.waiting; }
    else if (k === "tagged")  { av = a.status_distribution.tagged;  bv = b.status_distribution.tagged; }
    else if (k === "donePct") {
      av = a.total_records_in_cache ? a.properly_completed / a.total_records_in_cache : 0;
      bv = b.total_records_in_cache ? b.properly_completed / b.total_records_in_cache : 0;
    }
    else if (k === "completed")   { av = a.completed || 0; bv = b.completed || 0; }
    else if (k === "qa_reviewed") { av = a.qa_reviewed || 0; bv = b.qa_reviewed || 0; }
    else if (k === "qa_coverage") { av = a.qa_coverage_pct || 0; bv = b.qa_coverage_pct || 0; }
    else if (k === "teams")   { av = a.teams_worked.length; bv = b.teams_worked.length; }
    else if (k === "flags")   { av = a.flags.length; bv = b.flags.length; }
    else if (k === "tat") {
      // Completed → turn-around hours; in-progress → current age. Mixed on one
      // numeric axis so the column sorts sensibly across both kinds of row.
      av = a.is_completed && a.tat_hours != null ? a.tat_hours : (ageHours(a.date_first_seen) || 0);
      bv = b.is_completed && b.tat_hours != null ? b.tat_hours : (ageHours(b.date_first_seen) || 0);
    }
    else if (k === "date_last_modified") { av = a.date_last_modified || ""; bv = b.date_last_modified || ""; }
    else /* date_first_seen */ { av = a.date_first_seen || ""; bv = b.date_first_seen || ""; }
    if (av < bv) return -1 * dir;
    if (av > bv) return  1 * dir;
    return 0;
  });
  return out;
}

const FLAG_STYLES = {
  "company-gap": "red",
  "unassigned":  "red",
  "incomplete":  "amber",
  "high-waiting":"amber",
  "stuck":       "gray",
  "aging":       "amber",

function timeAgo(iso) {
  if (!iso) return "—";
  const ms = Date.now() - new Date(iso).getTime();
  if (isNaN(ms)) return iso;
  if (ms < 0) return "future";
  const m = ms / 60000;
  if (m < 60) return `${Math.round(m)}m ago`;
  const h = m / 60;
  if (h < 24) return `${Math.round(h)}h ago`;
  return `${Math.round(h / 24)}d ago`;
}
function pctClass(pct) { return pct >= 95 ? "good" : pct >= 70 ? "warn" : "bad"; }

// Size a scroll-region table to fill the viewport down to the bottom of its
// page, so the table (not the page) owns the scroll. Replaces the old fixed
// calc(100vh - Npx) guesses — adapts to topbar wrap, alerts, any screen size.
function fitTableHeight(tableEl) {
  if (!tableEl || !tableEl.offsetParent) return;            // not visible — skip
  const pageEl = tableEl.closest(".page");
  const tRect  = tableEl.getBoundingClientRect();
  // Fixed chrome below the table (panel + page bottom padding). Measured live;
  // scroll-independent because both rects move together.
  const belowChrome = pageEl ? Math.max(0, pageEl.getBoundingClientRect().bottom - tRect.bottom) : 60;
  const docTop = tRect.top + window.scrollY;                 // table's distance from document top
  const h = window.innerHeight - docTop - belowChrome - 8;   // 8px breathing room
  tableEl.style.maxHeight = Math.max(h, 220) + "px";         // floor: never absurdly short
}
// Re-fit on window resize (rAF-throttled). Registered once at parse time; the
// offsetParent guard inside fitTableHeight means only the visible table resizes.
let _fitRaf = null;
window.addEventListener("resize", () => {
  if (_fitRaf) return;
  _fitRaf = requestAnimationFrame(() => {
    _fitRaf = null;
    fitTableHeight(document.getElementById("tasksTable"));
    fitTableHeight(document.getElementById("newCompaniesTable"));
    fitTableHeight(document.getElementById("hourlyGrid"));
    fitTableHeight(document.getElementById("completedTable"));
  });
});

// Compact human duration from a count of hours: 30m / 5h / 2d 4h / — (null).
function formatDuration(hours) {
  if (hours == null || isNaN(hours)) return "—";
  if (hours < 1)  return `${Math.max(1, Math.round(hours * 60))}m`;
  if (hours < 24) return `${Math.round(hours)}h`;
  const d = Math.floor(hours / 24);
  const h = Math.round(hours % 24);
  return h ? `${d}d ${h}h` : `${d}d`;
}
// Hours elapsed since an ISO timestamp (float), or null if missing/unparseable.
function ageHours(iso) {
  if (!iso) return null;
  const ms = Date.now() - new Date(iso).getTime();
  return isNaN(ms) ? null : ms / 3600000;
}
// "19 May" short date, rendered in EAT to match the rest of the dashboard.
function shortDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "—";
  return d.toLocaleDateString("en-GB", { timeZone: "Africa/Nairobi", day: "numeric", month: "short" });
}
function median(arr) {
  if (!arr || !arr.length) return null;
  const s = [...arr].sort((a, b) => a - b);
  const m = Math.floor(s.length / 2);
  return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
}
// Turn-around table cell — compact 2 lines. Completed tasks show the duration
// plus a muted start→end range; in-progress tasks show a running age coloured
// amber (1–3d) / red (>3d) plus a muted "since <date>". Degrades to an age-only
// view for historical snapshots that predate the lifecycle fields.
function tatCell(t) {
  if (t.is_completed && t.tat_hours != null) {
    const range = `${shortDate(t.date_first_seen)} → ${shortDate(t.end_time)}`;
    return `<div>${esc(formatDuration(t.tat_hours))}</div><div class="small-mono">${esc(range)}</div>`;
  }
  const age = ageHours(t.date_first_seen);
  if (age == null) return '<span class="small-mono">—</span>';
  const days = age / 24;
  const col = days > 3 ? "var(--bad)" : days >= 1 ? "var(--warn)" : "var(--muted)";
  return `<div style="color:${col};font-weight:600">${esc(formatDuration(age))} open</div><div class="small-mono">since ${esc(shortDate(t.date_first_seen))}</div>`;
}

function renderTasksTable() {
  const list = _tasksFiltered();
  document.getElementById("tasksCount").textContent = `${list.length} of ${(STATE.v2?.tasks_all || []).length}`;
  const cols = [
    ["name", "Task name"], ["total", "Total"],
